<input type="text" id="commune" placeholder="البلدية">
<input type="text" id="adresse" placeholder="العنوان">

<input type="text" id="type" placeholder="نوع الإطار">
<input type="text" id="size" placeholder="مقاس الإطار">
<input type="number" id="qty" placeholder="الكمية">

<button onclick="sendAll()">إرسال الطلب</button>

</div>

<script>
function sendAll() {

    let now = new Date();

    let dateString = now.getFullYear() + "-" +
    ("0" + (now.getMonth() + 1)).slice(-2) + "-" +
    ("0" + now.getDate()).slice(-2) + " " +
    ("0" + now.getHours()).slice(-2) + ":" +
    ("0" + now.getMinutes()).slice(-2);

    let data = {
        date: dateString, // ✅ أضفنا التاريخ هنا
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        wilaya: document.getElementById("wilaya").value,
        commune: document.getElementById("commune").value,
        adresse: document.getElementById("adresse").value,
        type: document.getElementById("type").value,
        size: document.getElementById("size").value,
        qty: document.getElementById("qty").value
    };
    // ✅ رسالة واتساب
    let message = 
`🛞 طلب جديد - عبايدي للعجلات
📅 التاريخ: ${data.date}
👤 ${data.name}
📞 ${data.phone}

📍 ${data.wilaya}
🏠 ${data.commune}
📌 ${data.adresse}

🚗 ${data.type}
📏 ${data.size}
🔢 ${data.qty}`;

    let whatsappNumber = "213698749015";

    // ✅ إرسال إلى Google Sheets
    fetch("https://script.google.com/macros/s/AKfycbwwKbcVxlSP90Us2RbAfOWQkXp6rcO353pEPRkNjh5PewFHROFKd61QAmNJksuYebHrig/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        // ✅ بعد النجاح افتح واتساب
        let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);
        window.open(url, "_blank");

        alert("✅ تم إرسال الطلب");
    })
    .catch(() => {
        alert("❌ حدث خطأ");
    });
}
</script>
