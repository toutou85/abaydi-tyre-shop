const uniqueSizes = [...new Set(tireSizes)];

// البحث

const input =
document.getElementById("size");

const suggestionsBox =
document.getElementById("sizeSuggestions");

input.addEventListener("input",function(){

let value =
this.value.trim().toUpperCase().replace(/\s+/g,"");

if(value===""){

suggestionsBox.style.display="none";
return;

}

let results = uniqueSizes.filter(size=>
size.includes(value)
);

showSuggestions(results);

});

input.addEventListener("focus",function(){

if(this.value.trim()!==""){

this.dispatchEvent(new Event("input"));

}

});

function showSuggestions(results){

suggestionsBox.innerHTML="";

if(results.length===0){

suggestionsBox.innerHTML=
'<div class="no-result">لا توجد نتائج، يمكنك كتابة المقاس يدويًا</div>';

suggestionsBox.style.display="block";

return;

}

results.slice(0,50).forEach(size=>{

let div = document.createElement("div");

div.className="suggestion-item";

div.innerText=size;

div.onclick=()=>{

input.value=size;

input.classList.remove("error");

suggestionsBox.style.display="none";

};

suggestionsBox.appendChild(div);

});

suggestionsBox.style.display="block";

}

// إغلاق القائمة

document.addEventListener("click",function(e){

if(
!document
.querySelector(".size-search-box")
.contains(e.target)
){

suggestionsBox.style.display="none";

}

});

// التحقق

function validateField(f){

if(!f.value.trim()){

f.classList.add("error");

return false;

}

f.classList.remove("error");

return true;

}

document.querySelectorAll("input,select")
.forEach(f=>{

f.addEventListener("input",()=>{

f.classList.remove("error");

});

});

// إشعار

function showToast(msg){

let t=document.getElementById("toast");

t.innerText=msg;

t.classList.add("show");

setTimeout(()=>{

t.classList.remove("show");

},3000);

}

// تحقق من رقم الهاتف الجزائري (يقبل 05/06/07 و 9 أرقام بعد الصفر)

function isValidAlgerianPhone(phone){

let cleaned = phone.trim().replace(/\s+/g,"");

return /^0(5|6|7)\d{8}$/.test(cleaned);

}

// إرسال

function sendAll(){

let btn=document.querySelector("button");

let box=document.getElementById("statusBox");

let text=document.getElementById("statusText");

text.style.color="";

// تنسيق الهاتف

function formatPhone(phone){

phone=phone.trim().replace(/\s+/g,"");

if(!phone) return "";

if(phone.startsWith("+213"))
return phone;

if(phone.startsWith("0"))
return "+213"+phone.slice(1);

return "+213"+phone;

}

// البيانات

let phoneField = document.getElementById("phone");
let phone2Field = document.getElementById("phone2");
let wilayaField = document.getElementById("wilaya");

let rawPhone = phoneField.value.trim();
let rawPhone2 = phone2Field.value.trim();
let wilaya = wilayaField.value;
let commune = communeField.value;
let adresse = adresseField.value.trim();
let size = sizeField.value.trim();
let qty = qtyField.value;

// تحقق من الحقول الإلزامية

let fields=[
nameField,
phoneField,
wilayaField,
communeField,
adresseField,
sizeField,
qtyField
];

let firstError=null;

fields.forEach(f=>{

if(!validateField(f) && !firstError){

firstError=f;

}

});

if(firstError){

showToast("⚠️ يرجى ملء جميع الخانات");

firstError.focus();

return;

}

if(!isValidAlgerianPhone(rawPhone)){

phoneField.classList.add("error");

showToast("⚠️ رقم الهاتف غير صحيح (مثال: 0551234567)");

phoneField.focus();

return;

}

phone2Field.classList.add("error");

showToast("⚠️ رقم الهاتف الإضافي غير صحيح");

phone2Field.focus();

return;

}

// تحقق من الكمية

if(parseInt(qty,10)<=0 || isNaN(parseInt(qty,10))){

qtyField.classList.add("error");

showToast("⚠️ الرجاء إدخال كمية صحيحة");

qtyField.focus();
