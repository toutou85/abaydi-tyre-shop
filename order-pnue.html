 placeholder="الكمية">

<button onclick="sendAll()">إرسال الطلب</button>

<div id="statusBox" style="display:none; text-align:center; margin-top:10px;">
    <div class="spinner"></div>
    <p id="statusText">جاري إرسال الطلب...</p>
</div>

<script>function sendAll() {
    let btn = document.querySelector("button");
    let box = document.getElementById("statusBox");
    let text = document.getElementById("statusText");

    // دالة لتنسيق رقم الهاتف
    function formatPhone(phone) {
        phone = phone.trim();
        if (!phone) return "";
        if (phone.startsWith("+213")) return phone;
        if (phone.startsWith("0")) return "+213" + phone.slice(1);
        return "+213" + phone;
    }

    // جلب البيانات
    let name = document.getElementById("name").value.trim();
    let phone = formatPhone(document.getElementById("phone").value);
    let phone2 = formatPhone(document.getElementById("phone2") ? document.getElementById("phone2").value : "");
    let wilaya = document.getElementById("wilaya").value;
    let commune = document.getElementById("commune").value.trim();
    let adresse = document.getElementById("adresse").value.trim();
    let type = document.getElementById("type").value.trim();
    let size = document.getElementById("size").value.trim();
    let qty = document.getElementById("qty").value;

    // تحقق من الحقول الإلزامية
    if (!name || !phone || !wilaya || !commune || !adresse || !type || !size || !qty) {
        box.style.display = "block";
        text.innerText = "⚠️ يرجى ملء جميع الخانات";
        text.style.color = "red";
        return;
    }

    // التاريخ
    let now = new Date();
    let dateString = now.toLocaleString("fr-FR");

    // دمج اسم الإطار + المقاس
    let tireInfo = type + " - " + size;

    // بيانات للإرسال إلى Google Sheets
    let data = {
        date: dateString,
        name: name,
        phone: phone,
        phone2: phone2,
        wilaya: wilaya,
        commune: commune,
        adresse: adresse,
        tireInfo: tireInfo,  // هذا العمود سيحمل الاسم + المقاس
        qty: qty
    };

    // إظهار التحميل
    box.style.display = "block";
    text.innerText = "⏳ جاري إرسال الطلب...";
    text.style.color = "black";
    btn.disabled = true;
    btn.innerText = "جاري الإرسال...";

    // رسالة واتساب
    let message = 
`🛞 طلب جديد - عبايدي للعجلات

📅 ${data.date}
👤 ${data.name}
📞 ${data.phone}
📞 إضافي: ${data.phone2 || "لا يوجد"}

📍 ${data.wilaya}
🏠 ${data.commune}
📌 ${data.adresse}

🚗 ${tireInfo}
🔢 ${data.qty}`;

    let whatsappNumber = "213698749015";

    // إرسال إلى Google Sheets
    fetch("https://script.google.com/macros/s/AKfycbxYHBPM5Fr-LCnNUhwdEEmuXkdWLVQdF6lxLLaAiB1jzVQYnLGCOEK_evocNhbJXf9iKg/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);
        window.open(url, "_blank");

        text.innerText = "✅ تم إرسال الطلب بنجاح";
        text.style.color = "green";

        btn.disabled = false;
        btn.innerText = "إرسال الطلب";
    })
    .catch(() => {
        text.innerText = "❌ حدث خطأ، حاول مرة أخرى";
        text.style.color = "red";

        btn.disabled = false;
        btn.innerText = "إرسال الطلب";
    });
}
</script>
