<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب شراء - عبايدي للعجلات</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    direction: rtl;
    text-align: right;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 20px;
    margin-top: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

h2 {
    text-align: center;
    color: #333;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}
</style>
</head>

<body>

<div class="container">
    <h2>🛞 طلب شراء إطارات<br>عبايدي للعجلات</h2>

    <input type="text" id="nom" placeholder="الاسم" required>
    <input type="text" id="prenom" placeholder="اللقب" required>
    <input type="tel" id="phone" placeholder="رقم الهاتف" required>

    <input type="text" id="wilaya" placeholder="الولاية" required>
    <input type="text" id="commune" placeholder="البلدية" required>

    <input type="text" id="type" placeholder="نوع الإطار" required>
    <input type="text" id="size" placeholder="رقم / مقاس الإطار" required>

    <input type="number" id="qty" placeholder="الكمية" required>

    <select id="contact">
        <option value="واتساب">التواصل عبر واتساب</option>
        <option value="مكالمة">مكالمة هاتفية</option>
    </select>

    <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<script>
function sendOrder() {

    let nom = document.getElementById("nom").value;
    let prenom = document.getElementById("prenom").value;
    let phone = document.getElementById("phone").value;
    let wilaya = document.getElementById("wilaya").value;
    let commune = document.getElementById("commune").value;
    let type = document.getElementById("type").value;
    let size = document.getElementById("size").value;
    let qty = document.getElementById("qty").value;
    let contact = document.getElementById("contact").value;

    let message = 
`🛞 طلب جديد - عبايدي للعجلات

👤 الاسم: ${nom} ${prenom}
📞 الهاتف: ${phone}

📍 الولاية: ${wilaya}
🏠 البلدية: ${commune}

🚗 نوع الإطار: ${type}
📏 المقاس: ${size}
🔢 الكمية: ${qty}

📲 طريقة التواصل: ${contact}`;

    let whatsappNumber = "213656450486"; // ضع رقمك هنا

    let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
