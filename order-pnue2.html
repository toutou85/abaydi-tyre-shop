<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام PNUE الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button {
  padding: 8px;
}

.table-wrapper {
  overflow-x: auto;
  max-height: 75vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1500px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
  z-index: 2;
}

button {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: darkred;
}

/* ===== Modal ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 99999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 500px;
  padding: 15px;
  border-radius: 10px;
}

.note-item {
  border-bottom: 1px solid #ccc;
  padding: 5px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #333;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  z-index: 999999;
  font-size: 14px;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success { background: #28a745; }
.toast.error { background: #dc3545; }

/* 📱 تصميم الهاتف */
@media (max-width: 768px) {

  .controls {
    flex-direction: column;
  }

  input, select, button {
    width: 100%;
    font-size: 14px;
    padding: 10px;
  }

  /* تحويل الجدول إلى كروت */
  table, thead {
    display: none;
  }

  #data {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #data tr {
    display: block;
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  }

  #data td {
    display: block;
    text-align: right;
    border: none;
    padding: 5px 0;
    font-size: 14px;
  }

  #data td::before {
    font-weight: bold;
    color: #555;
  }

  #data td:nth-child(1)::before { content: "# : "; }
  #data td:nth-child(2)::before { content: "الاسم : "; }
  #data td:nth-child(3)::before { content: "الهاتف : "; }
  #data td:nth-child(4)::before { content: "الولاية : "; }
  #data td:nth-child(5)::before { content: "البلدية : "; }
  #data td:nth-child(6)::before { content: "العنوان : "; }
  #data td:nth-child(7)::before { content: "المنتج : "; }
  #data td:nth-child(8)::before { content: "التاريخ : "; }
  #data td:nth-child(9)::before { content: "الملاحظات : "; }

  td button {
    width: 100%;
    margin-top: 6px;
  }
}
</style>

</head>

<body>

<h2 style="text-align:center;">📊 نظام PNUE الاحترافي</h2>

<div class="controls">
<input type="text" id="search" placeholder="🔍 بحث..." oninput="render()">

<select id="filter" onchange="render()">
  <option value="all">📄 الكل</option>
  <option value="has">📝 فيه ملاحظات</option>
  <option value="no">🚫 بدون ملاحظات</option>
</select>

<button onclick="showMore()">عرض المزيد</button>
<button onclick="showAll()">عرض الكل</button>

<div id="toast" class="toast"></div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">

<h3>📌 الملاحظات</h3>

<div id="notesBox"></div>

<textarea id="newNote" style="width:100%;height:80px;"></textarea>

<br><br>

<button onclick="addNote()">➕ إضافة</button>
<button onclick="saveNotes()">💾 حفظ</button>
<button onclick="closeModal()">✖ إغلاق</button>

</div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzUONDWc43MtRWkyMpoLgAeEXKwLumFTO4A09K-XRcivHyIOO6r10bOH9swU73MNxUIcQ/exec";

let allData = [];
let limit = 10;
let currentIndex = null;
let currentNotes = [];

function clean(val){
  return (val && val !== "null" && val !== "undefined") ? val : "";
}

function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {
    allData = (data || []).filter(row => {
      let values = Object.entries(row)
        .filter(([key]) => key !== "id")
        .map(([_, v]) => v);
      return values.some(v => v && v.toString().trim() !== "");
    });
    allData.reverse();
    render();
  });
}

function getNotes(note){
  if(!note) return [];
  try {
    let parsed = JSON.parse(note);
    return Array.isArray(parsed) ? parsed : [{text: note, date:""}];
  } catch {
    return [{text: note, date:""}];
  }
}

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let filtered = [];

  allData.forEach((row)=>{
    let notes = getNotes(row.note);

    if(filter==="has" && notes.length===0) return;
    if(filter==="no" && notes.length>0) return;

    let text = Object.values(row).join(" ").toLowerCase();
    if(!text.includes(search)) return;

    filtered.push({row, notes});
  });

  let sliced = filtered.slice(0, limit);

  let html = "";

  sliced.forEach((item,index)=>{
    let lastNote = item.notes.length ? item.notes[item.notes.length-1].text : "";

    html += `
    <tr>
      <td>${index+1}</td>
      <td>${clean(item.row.name)}</td>
      <td>${clean(item.row.phone)}</td>
      <td>${clean(item.row.wilaya)}</td>
      <td>${clean(item.row.commune)}</td>
      <td>${clean(item.row.adresse)}</td>
      <td>${clean(item.row.product)}</td>
      <td>${new Date(item.row.date).toLocaleString('ar-DZ')}</td>
      <td>
        ${lastNote}<br>
        <button onclick="openNotes(${item.row.id})">👁 عرض</button>
      </td>
      <td>
        <button onclick="deleteRow(${item.row.id})">❌</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function showMore(){ limit += 10; render(); }
function showAll(){ limit = allData.length; render(); }

function deleteRow(i){
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      body: JSON.stringify({action:"delete", index:i})
    }).then(()=> loadData());
  }
}

function openNotes(rowId){
  currentIndex = rowId;
  currentNotes = getNotes(allData.find(r => r.id === rowId).note);
  renderNotes();
  document.getElementById("modal").style.display = "flex";
}

function renderNotes(){
  let html = "";
  currentNotes.forEach((n,index)=>{
    html += `
    <div class="note-item">
      <b>${n.date || ""}</b><br>
      ${n.text}
      <br>
      <button onclick="deleteNote(${index})">❌</button>
    </div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString('ar-DZ')
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

function deleteNote(index){
  currentNotes.splice(index,1);
  renderNotes();
}

function saveNotes(){
  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index: currentIndex,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  }).then(()=> loadData());

  closeModal();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

loadData();
</script>

</body>
</html>
