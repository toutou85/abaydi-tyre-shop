<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام متقدم</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

/* ===== أدوات ===== */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

input, select, button {
  padding: 8px;
}

/* ===== جدول ===== */
.table-wrapper {
  overflow: auto;
  max-height: 75vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1600px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  white-space: nowrap;
}

/* ===== رأس ثابت ===== */
th {
  background: #eee;
  position: sticky;
  top: 0;
  z-index: 2;
  cursor: pointer;
}

/* ===== ملاحظات ===== */
.note-cell {
  min-width: 260px;
  white-space: normal;
}

/* ===== زر ===== */
button {
  cursor: pointer;
  border: none;
  background: #d33;
  color: #fff;
  border-radius: 5px;
}

/* ===== مودال ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  width: 500px;
  margin: 5% auto;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: left;
  cursor: pointer;
}

/* ===== ملاحظات ===== */
.note-item {
  border-bottom: 1px solid #ccc;
  padding: 6px;
}
</style>

</head>

<body>

<h2 style="text-align:center;">📊 نظام إدارة متقدم</h2>

<!-- ===== أدوات التحكم ===== -->
<div class="controls">

<input type="text" id="search" placeholder="🔍 بحث..." oninput="renderTable()">

<select id="filter" onchange="renderTable()">
  <option value="all">📄 الكل</option>
  <option value="hasNote">📝 فيه ملاحظات</option>
  <option value="noNote">🚫 بدون ملاحظات</option>
</select>

<button onclick="showAll()">عرض كل</button>
<button onclick="showLess()">عرض أقل</button>

</div>

<!-- ===== جدول ===== -->
<div class="table-wrapper">
<table>

<thead>
<tr>
<th onclick="sortTable(0)">الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th onclick="sortTable(6)">التاريخ ⬍</th>
<th>الملاحظات</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>
</div>

<!-- ===== Modal ===== -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3>📌 الملاحظات</h3>
    <div id="notesBox"></div>
    <textarea id="newNote"></textarea>
    <br><br>
    <button onclick="addNote()">➕ إضافة</button>
    <button onclick="saveNotes()">💾 حفظ</button>
  </div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let currentIndex = null;
let currentNotes = [];
let showLimit = 50;

/* ===== تحميل ===== */
function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {

    allData = data || [];

    // ترتيب من الأقدم
    allData.sort((a,b)=> new Date(a.date) - new Date(b.date));

    renderTable();
  });
}

/* ===== عرض ===== */
function renderTable(){

  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let html = "";
  let count = 0;

  allData.forEach((row,i)=>{

    let notes = [];
    try { notes = row.note ? JSON.parse(row.note) : []; } catch {}

    let lastNote = notes.length ? notes[notes.length - 1].text : "";

    // ===== فلترة =====
    if(filter === "hasNote" && notes.length === 0) return;
    if(filter === "noNote" && notes.length > 0) return;

    // ===== بحث =====
    let rowText = Object.values(row).join(" ").toLowerCase();
    if(!rowText.includes(search)) return;

    // ===== عرض أقل =====
    if(count >= showLimit) return;

    count++;

    html += `
    <tr>

      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.commune || ""}</td>
      <td>${row.adresse || ""}</td>
      <td>${row.product || ""}</td>
      <td>${row.date || ""}</td>

      <td class="note-cell">
        ${lastNote || ""}
        <br>
        <button onclick="openNotes(${i})">👁 عرض</button>
      </td>

    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== عرض أقل / كل ===== */
function showLess(){
  showLimit = 50;
  renderTable();
}

function showAll(){
  showLimit = 100000;
  renderTable();
}

/* ===== فرز ===== */
let sortAsc = true;

function sortTable(col){

  allData.sort((a,b)=>{
    let x = Object.values(a)[col] || "";
    let y = Object.values(b)[col] || "";

    return sortAsc ? 
      x.localeCompare(y) :
      y.localeCompare(x);
  });

  sortAsc = !sortAsc;
  renderTable();
}

/* ===== ملاحظات ===== */
function openNotes(index){

  currentIndex = index;

  try {
    currentNotes = allData[index].note ? JSON.parse(allData[index].note) : [];
  } catch {
    currentNotes = [];
  }

  renderNotes();
  document.getElementById("modal").style.display = "block";
}

function renderNotes(){

  let html = "";

  currentNotes.forEach(n=>{
    html += `
    <div class="note-item">
      <b>${n.date}</b><br>
      ${n.text}
    </div>
    `;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* ===== إضافة ===== */
function addNote(){

  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value = "";
  renderNotes();
}

/* ===== حفظ ===== */
function saveNotes(){

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index:currentIndex,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  }).then(()=> loadData());

  closeModal();
}

/* ===== إغلاق ===== */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

loadData();

</script>

</body>
</html>
