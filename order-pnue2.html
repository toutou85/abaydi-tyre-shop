<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE TABLE</title>

<style>
body {font-family: Arial; direction: rtl; padding: 15px; background: #f4f4f4;}
h2 {text-align: center;}
table {width: 100%; border-collapse: collapse; background: #fff;}
th, td {border: 1px solid #ccc; padding: 5px; text-align: center;}
th {background: #eee; position: sticky; top: 0;}
input {width: 100%; border: none; text-align: center; background: transparent;}
input:focus {background: #ffffcc;}
textarea {width: 100%; height: 80px;}
button {background: red; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 4px;}
button:hover {background: darkred;}
#toast {position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 10px 20px; border-radius: 5px; display: none;}
</style>

</head>
<body>

<input id="search" placeholder="🔍 ابحث..." onkeyup="applyFilters()" style="width:100%; padding:10px;">

<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<div id="toast">تم الحفظ</div>

<button onclick="loadMore()">عرض المزيد</button>

<script>

const url = "PUT_YOUR_SCRIPT_URL_HERE";

let allData = [];
let visibleCount = 5;

// تحميل
function loadData() {
  fetch(url)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderTable();
  });
}

// عرض
function renderTable() {
  let html = "";

  // 🔥 ترتيب حسب ID (الأحدث أولاً)
  let sorted = [...allData].sort((a,b)=>b.id-a.id);

  let limited = sorted.slice(0, visibleCount);

  limited.forEach(row => {
    html += `
    <tr>
      <td>${row.id}</td>
      <td><input value="${row.name||''}" onchange="updateRow(${row.id},'name',this.value)"></td>
      <td><input value="${row.phone||''}" onchange="updateRow(${row.id},'phone',this.value)"></td>
      <td><input value="${row.wilaya||''}" onchange="updateRow(${row.id},'wilaya',this.value)"></td>
      <td><input value="${row.commune||''}" onchange="updateRow(${row.id},'commune',this.value)"></td>
      <td><input value="${row.adresse||''}" onchange="updateRow(${row.id},'adresse',this.value)"></td>
      <td><input value="${row.product||''}" onchange="updateRow(${row.id},'product',this.value)"></td>
      <td><input value="${row.date||''}" onchange="updateRow(${row.id},'date',this.value)"></td>
      <td><textarea onchange="updateRow(${row.id},'note',this.value)">${row.note||''}</textarea></td>
      <td><button onclick="deleteRow(${row.id})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

// تعديل
function updateRow(id, field, value) {
  fetch(url, {
    method:"POST",
    body:JSON.stringify({
      action:"updateAll",
      index:id,
      field:field,
      value:value
    })
  }).then(()=>showToast());
}

// حذف
function deleteRow(id) {
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      body:JSON.stringify({
        action:"delete",
        index:id
      })
    }).then(()=>loadData());
  }
}

// عرض المزيد
function loadMore(){
  visibleCount+=5;
  renderTable();
}

// فلترة
function applyFilters(){
  let search=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("#data tr").forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(search)?"":"none";
  });
}

// toast
function showToast(){
  let t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

loadData();

</script>

</body>
</html>
