<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول الطلبات</title>

<style>
body {font-family: Arial; direction: rtl; padding: 15px; background: #f4f4f4;}
table {width: 100%; border-collapse: collapse; background: #fff;}
th, td {border: 1px solid #ccc; padding: 8px; text-align: center;}
th {background: #eee;}
input, textarea {width: 100%; border: none; background: transparent; text-align: center;}
button {padding: 5px 10px; background: red; color: #fff; border: none; cursor: pointer; margin-top: 10px;}
button:hover {background: darkred;}
#search {width: 100%; padding: 10px; margin-bottom: 10px;}
</style>
</head>
<body>

<h2>📋 جدول الطلبات</h2>

<input type="text" id="search" placeholder="🔍 بحث..." onkeyup="applyFilters()">

<table>
<thead>
<tr>
<th>ترقيم</th>
<th>ID</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>ملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<button onclick="loadMore()">عرض المزيد</button>
<button onclick="showAll()">عرض الكل</button>

<script>
const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let visibleCount = 10;

function loadData(){
  fetch(url)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderTable();
  });
}

function renderTable(){
  let html = "";
  let sorted = [...allData].sort((a,b) => b.id - a.id);
  let limited = sorted.slice(0, visibleCount);

  limited.forEach((row, index) => {
    html += `
    <tr>
      <td>${index + 1}</td>
      <td>${row.id}</td>
      <td><input value="${row.name || ''}" onchange="updateRow(${row.id}, 'name', this.value)"></td>
      <td><input value="${row.phone || ''}" onchange="updateRow(${row.id}, 'phone', this.value)"></td>
      <td><input value="${row.wilaya || ''}" onchange="updateRow(${row.id}, 'wilaya', this.value)"></td>
      <td><input value="${row.commune || ''}" onchange="updateRow(${row.id}, 'commune', this.value)"></td>
      <td><input value="${row.adresse || ''}" onchange="updateRow(${row.id}, 'adresse', this.value)"></td>
      <td><input value="${row.product || ''}" onchange="updateRow(${row.id}, 'product', this.value)"></td>
      <td><input value="${row.date || ''}" onchange="updateRow(${row.id}, 'date', this.value)"></td>
      <td><textarea onchange="updateRow(${row.id}, 'note', this.value)">${row.note || ''}</textarea></td>
      <td><button onclick="deleteRow(${row.id})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function updateRow(id, field, value){
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: id,
      field: field,
      value: value
    })
  }).then(loadData);
}

function deleteRow(id){
  if (confirm("هل تريد حذف هذا السجل؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: id
      })
    }).then(loadData);
  }
}

function loadMore(){
  visibleCount += 10;
  renderTable();
}

function showAll(){
  visibleCount = allData.length;
  renderTable();
}

function applyFilters(){
  let filter = document.getElementById("search").value.toLowerCase().trim();
  let rows = Array.from(document.querySelectorAll("#data tr"));

  // تحويل الصفوف إلى مصفوفة مع قيمة التوافق
  let scoredRows = rows.map(tr => {
    let product = tr.children[7].querySelector("input").value.toLowerCase();

    let score = 0;
    let words = filter.split(" ").filter(w => w !== "");

    words.forEach(word => {
      if (product.includes(word)) score++;
    });

    return {tr, score};
  });

  // ترتيب حسب الأفضل تطابقًا
  scoredRows.sort((a, b) => b.score - a.score);

  // إظهار / إخفاء
  scoredRows.forEach(item => {
    item.tr.style.display = item.score > 0 || filter === "" ? "" : "none";
  });

  // إعادة ترتيب الصفوف في الجدول
  let tbody = document.getElementById("data");
  scoredRows.forEach(item => tbody.appendChild(item.tr));
}

loadData();
</script>

</body>
</html>
