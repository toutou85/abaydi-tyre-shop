<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📦 طلبات الزبائن</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    direction: rtl;
    padding: 10px;
}

h2 {
    text-align: center;
}

.search-box {
    width: 95%;
    padding: 10px;
    margin: 10px auto;
    display: block;
    border-radius: 5px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: green;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tr:hover {
    background: #f1f1f1;
}

.refresh {
    display: block;
    margin: 10px auto;
    padding: 10px;
    background: orange;
    color: white;
    border: none;
    border-radius: 5px;
}

</style>
</head>

<body>

<h2>📦 طلبات الزبائن</h2>

<input type="text" id="search" class="search-box" placeholder="🔍 ابحث عن اسم أو رقم هاتف...">

<button class="refresh" onclick="loadData()">🔄 تحديث</button>

<table>
    <thead>
        <tr>
            <th>📅 التاريخ</th>
            <th>👤 الاسم</th>
            <th>📞 الهاتف</th>
            <th>📍 الولاية</th>
            <th>🏠 المكتب</th>
            <th>🚗 الإطار</th>
            <th>🔢 الكمية</th>
        </tr>
    </thead>
    <tbody id="tableData"></tbody>
</table>

<script>

let allData = [];

function loadData() {
    fetch("https://script.google.com/macros/s/AKfycbxLvMoeXSCmHe5vDqTYGsW24hcGjWu_2TyUPlEyc57TUEQe5DHDWjLzPcpmgKYBJmL1-Q/exec")
    .then(res => res.json())
    .then(data => {
        allData = data.reverse(); // الأحدث أولاً
        displayData(allData);
    });
}

function displayData(data) {
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach(item => {
        let row = `
        <tr>
            <td>${item.date}</td>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${item.wilaya}</td>
            <td>${item.commune}</td>
            <td>${item.tireInfo}</td>
            <td>${item.qty}</td>
        </tr>`;
        table.innerHTML += row;
    });
}

// البحث
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();

    let filtered = allData.filter(item =>
        item.name.toLowerCase().includes(value) ||
        item.phone.includes(value)
    );

    displayData(filtered);
});

// تحميل أولي
loadData();

// تحديث تلقائي كل 30 ثانية
setInterval(loadData, 30000);

</script>

</body>
</html>
