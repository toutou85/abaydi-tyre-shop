<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #f4f4f4;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

#search {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

.stats {
    background: #e8f5e9;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: green;
    color: white;
}

.new {
    background: #d4edda;
}

button.delete {
    background: red;
    color: white;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h2>🔐 تسجيل الدخول</h2>
<input type="password" id="password" placeholder="ادخل كلمة السر">
<button onclick="login()">دخول</button>
</div>

<div class="container" id="panel" style="display:none;">

<h2>📦 طلبات الزبائن</h2>

<div class="stats" id="stats"></div>

<input type="text" id="search" placeholder="🔍 ابحث...">

<table>
<thead>
<tr>
<th>التاريخ</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>المكتب</th>
<th>العنوان</th>
<th>الإطار</th>
<th>الكمية</th>
<th>حذف</th>
    <th>ملاحظات</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyPQZXc-Qsrusw1Gb-NW6ajtY-5f501_Nl1HGMgGq-3zUJuEEAZ_aaxEzP8mwoamPp3OA/exec";
const PASSWORD = "1234"; // غيرها

let allData = [];

// تسجيل الدخول
function login() {
    let pass = document.getElementById("password").value;

    if (pass === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panel").style.display = "block";
        loadData();
    } else {
        alert("❌ كلمة السر خاطئة");
    }
}

// تحميل البيانات
function loadData() {
    fetch(API)
    .then(res => res.text()) // 👈 بدل json
    .then(text => {

        console.log("API RESPONSE:", text); // 👈 مهم للتجربة

        let data;

        try {
            data = JSON.parse(text);
        } catch (e) {
            alert("❌ خطأ في API: " + text);
            return;
        }

        allData = data.sort((a, b) => new Date(b.date) - new Date(a.date));

        showData(allData);

        document.getElementById("stats").innerText =
            "📊 عدد الطلبات: " + allData.length;
    })
    .catch(err => {
        alert("❌ فشل الاتصال بالسيرفر");
        console.error(err);
    });
}

// البحث
document.getElementById("search").addEventListener("input", function () {
    let value = this.value.toLowerCase();

    let filtered = allData.filter(o =>
        Object.values(o).join(" ").toLowerCase().includes(value)
    );

    showData(filtered);
});

// حذف
function deleteOrder(index) {

    if (!confirm("هل تريد حذف الطلب؟")) return;

    fetch(API + "?action=delete&index=" + index)
    .then(() => {
        loadData();
    });
}

</script>

</body>
</html>
