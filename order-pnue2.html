<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الطلبات الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 15px;
}

h2 { text-align: center; }

/* ===== جدول ===== */
.table-wrapper {
  overflow-x: auto;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1400px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

/* ===== Inputs ===== */
input {
  width: 100%;
  border: none;
  text-align: center;
  background: transparent;
}

/* ===== أزرار ===== */
button {
  padding: 5px 8px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}

/* ===== شريط التحكم ===== */
.controls {
  margin-bottom: 10px;
}

.controls button {
  background: #333;
  margin: 2px;
}

.controls button:hover {
  background: black;
}

/* ===== Modal ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  width: 400px;
  margin: 10% auto;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: left;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>📋 نظام الطلبات الاحترافي</h2>

<input id="search" placeholder="🔍 بحث..." onkeyup="applyFilters()">

<div class="controls">
  <button onclick="setView(5)">عرض أقل</button>
  <button onclick="setView(20)">عرض متوسط</button>
  <button onclick="setView(allData.length)">عرض الكل</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h3>📌 الملاحظات</h3>
    <div id="notesBox"></div>

    <textarea id="newNote"></textarea>

    <br><br>
    <button onclick="addNote()">➕ إضافة</button>
    <button onclick="saveNotes()">💾 حفظ</button>
  </div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";

let allData = [];
let filteredData = [];
let visibleCount = 5;
let currentIndex = null;
let currentNotes = [];

/* ===== تحميل ===== */
function loadData(){
  fetch(url)
    .then(r => r.json())
    .then(data => {
      allData = data || [];
      filteredData = [...allData];
      renderTable();
    })
    .catch(err => console.error(err));
}

/* ===== عرض ===== */
function renderTable(){

  let html = "";

  let sorted = [...filteredData].sort((a,b)=> new Date(b.date) - new Date(a.date));

  let limited = sorted.slice(0, visibleCount);

  limited.forEach((row, i)=>{

    let notes = [];
    try {
      notes = row.note ? JSON.parse(row.note) : [];
    } catch {}

    let lastNote = notes.length ? notes[notes.length - 1].text : "";

    html += `
    <tr>
      <td><input value="${row.name||''}" onchange="updateRow(${i},'name',this.value)"></td>
      <td><input value="${row.phone||''}" onchange="updateRow(${i},'phone',this.value)"></td>
      <td><input value="${row.wilaya||''}" onchange="updateRow(${i},'wilaya',this.value)"></td>
      <td><input value="${row.commune||''}" onchange="updateRow(${i},'commune',this.value)"></td>
      <td><input value="${row.adresse||''}" onchange="updateRow(${i},'adresse',this.value)"></td>
      <td><input value="${row.product||''}" onchange="updateRow(${i},'product',this.value)"></td>
      <td><input value="${row.date||''}" onchange="updateRow(${i},'date',this.value)"></td>

      <td>
        ${lastNote}
        <br>
        <button onclick="openNotes(${i})">👁 عرض</button>
      </td>

      <td><button onclick="deleteRow(${i})">❌</button></td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== التحكم في العرض ===== */
function setView(count){
  visibleCount = count;
  renderTable();
}

/* ===== تعديل ===== */
function updateRow(index, field, value){
  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index:index,
      field:field,
      value:value
    })
  });
}

/* ===== حذف ===== */
function deleteRow(index){
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      body: JSON.stringify({
        action:"delete",
        index:index
      })
    }).then(()=> loadData());
  }
}

/* ===== فتح الملاحظات ===== */
function openNotes(index){

  currentIndex = index;

  let row = filteredData[index];

  try {
    currentNotes = row.note ? JSON.parse(row.note) : [];
  } catch {
    currentNotes = [];
  }

  renderNotes();
  document.getElementById("modal").style.display = "block";
}

/* ===== عرض الملاحظات ===== */
function renderNotes(){

  let html = "";

  currentNotes.forEach(n=>{
    html += `
      <div style="border-bottom:1px solid #ccc;padding:5px;">
        <b>${n.date}</b><br>
        ${n.text}
      </div>
    `;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* ===== إضافة ملاحظة ===== */
function addNote(){

  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text:text,
    date:new Date().toLocaleString()
  });

  document.getElementById("newNote").value = "";
  renderNotes();
}

/* ===== حفظ ===== */
function saveNotes(){

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index:currentIndex,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  }).then(()=> loadData());

  closeModal();
}

/* ===== إغلاق ===== */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== البحث ===== */
function applyFilters(){

  let val = document.getElementById("search").value.toLowerCase();

  filteredData = allData.filter(r =>
    (r.name||"").toLowerCase().includes(val) ||
    (r.phone||"").toLowerCase().includes(val) ||
    (r.product||"").toLowerCase().includes(val)
  );

  renderTable();
}

/* ===== تشغيل ===== */
loadData();

</script>

</body>
</html>
