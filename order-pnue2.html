<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول الطلبات</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

/* ===== شريط تمرير ===== */
.table-container {
  overflow-x: auto;
  width: 100%;
  background: #fff;
}

table {
  width: 1500px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
}

th { background: #eee; }

input, textarea {
  width: 100%;
  border: none;
  background: transparent;
  text-align: center;
}

button {
  padding: 5px 10px;
  background: red;
  color: #fff;
  border: none;
  cursor: pointer;
  margin: 3px;
}

button:hover { background: darkred; }

#search {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

/* ===== Modal ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  padding: 20px;
  width: 450px;
  margin: 8% auto;
  border-radius: 10px;
  text-align: center;
}

.modal textarea {
  width: 100%;
  height: 80px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

.close {
  float: left;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>

<body>

<h2>📋 جدول الطلبات</h2>

<input type="text" id="search" placeholder="🔍 بحث..." onkeyup="applyFilters()">

<div class="table-container">
<table>
<thead>
<tr>
<th>ترقيم</th>
<th>ID</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<button onclick="loadMore()">عرض المزيد</button>
<button onclick="showLess()">عرض أقل</button>
<button onclick="showAll()">عرض الكل</button>

<!-- ===== Modal ===== -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3>📌 الملاحظات</h3>

    <div id="modalData" style="text-align:right; max-height:200px; overflow-y:auto;"></div>

    <textarea id="newNote" placeholder="اكتب ملاحظة جديدة..."></textarea>

    <br><br>
    <button onclick="addNote()">➕ إضافة</button>
    <button onclick="saveNotes()">💾 حفظ</button>
    <button onclick="deleteNotes()">🗑 حذف</button>
  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let visibleCount = 10;
let isFiltering = false;

let currentRowId = null;
let currentNotes = [];

function loadData(){
  fetch(url)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderTable();
  });
}

function renderTable(){
  let html = "";
  let sorted = [...allData].sort((a,b) => b.id - a.id);
  let limited = isFiltering ? sorted : sorted.slice(0, visibleCount);

  limited.forEach((row, index) => {

    let notes = row.note || [];

    let lastNote = notes.length > 0 ? notes[notes.length - 1].text : "";

    html += `
    <tr>
      <td>${index + 1}</td>
      <td>${row.id}</td>
      <td><input value="${row.name || ''}" onchange="updateRow(${row.id}, 'name', this.value)"></td>
      <td><input value="${row.phone || ''}" onchange="updateRow(${row.id}, 'phone', this.value)"></td>
      <td><input value="${row.wilaya || ''}" onchange="updateRow(${row.id}, 'wilaya', this.value)"></td>
      <td><input value="${row.commune || ''}" onchange="updateRow(${row.id}, 'commune', this.value)"></td>
      <td><input value="${row.adresse || ''}" onchange="updateRow(${row.id}, 'adresse', this.value)"></td>
      <td><input value="${row.product || ''}" onchange="updateRow(${row.id}, 'product', this.value)"></td>
      <td><input value="${row.date || ''}" onchange="updateRow(${row.id}, 'date', this.value)"></td>

      <td>
        ${lastNote}

        <br>

        <button 
          onclick="openNotes(this)"
          data-id="${row.id}"
          data-notes='${encodeURIComponent(JSON.stringify(notes))}'
        >
          👁 عرض
        </button>
      </td>

      <td><button onclick="deleteRow(${row.id})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== فتح الملاحظات ===== */
function openNotes(btn){
  currentRowId = btn.getAttribute("data-id");

  let notesData = btn.getAttribute("data-notes");

  try {
    currentNotes = JSON.parse(decodeURIComponent(notesData)) || [];
  } catch {
    currentNotes = [];
  }

  renderModalNotes();
  document.getElementById("modal").style.display = "block";
}

/* ===== عرض الملاحظات ===== */
function renderModalNotes(){
  let html = "";

  currentNotes.forEach(n => {
    html += `<div style="border-bottom:1px solid #ccc; padding:5px;">
      <b>${n.date}</b><br>
      ${n.text}
    </div>`;
  });

  document.getElementById("modalData").innerHTML = html;
}

/* ===== إضافة ملاحظة ===== */
function addNote(){
  let text = document.getElementById("newNote").value;

  if(text.trim() === "") return;

  let now = new Date().toLocaleString();

  currentNotes.push({
    text: text,
    date: now
  });

  document.getElementById("newNote").value = "";

  renderModalNotes();
}

/* ===== حفظ ===== */
function saveNotes(){
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: currentRowId,
      field: "note",
      value: JSON.stringify(currentNotes)
    })
  }).then(() => {
    loadData();
    closeModal();
  });
}

/* ===== حذف ===== */
function deleteNotes(){
  currentNotes = [];
  renderModalNotes();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function updateRow(id, field, value){
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: id,
      field: field,
      value: value
    })
  }).then(loadData);
}

function deleteRow(id){
  if(confirm("هل تريد حذف هذا السجل؟")){
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: id
      })
    }).then(loadData);
  }
}

function loadMore(){
  visibleCount += 10;
  isFiltering = false;
  renderTable();
}

function showAll(){
  visibleCount = allData.length;
  isFiltering = false;
  renderTable();
}

function showLess(){
  visibleCount = 10;
  isFiltering = false;
  renderTable();
}

function applyFilters(){
  let filter = document.getElementById("search").value.toLowerCase();

  if(filter === ""){
    isFiltering = false;
    renderTable();
    return;
  }

  isFiltering = true;

  let words = filter.split(" ").filter(w => w);

  let results = allData.filter(row => {
    let product = (row.product || "").toLowerCase();
    return words.every(word => product.includes(word));
  });

  let html = "";

  results.forEach((row, index) => {

    let notes = row.note || [];
    let lastNote = notes.length > 0 ? notes[notes.length - 1].text : "";

    html += `
    <tr>
      <td>${index + 1}</td>
      <td>${row.id}</td>
      <td><input value="${row.name || ''}"></td>
      <td><input value="${row.phone || ''}"></td>
      <td><input value="${row.wilaya || ''}"></td>
      <td><input value="${row.commune || ''}"></td>
      <td><input value="${row.adresse || ''}"></td>
      <td><input value="${row.product || ''}"></td>
      <td><input value="${row.date || ''}"></td>
      <td>
        ${lastNote}

        <br>

        <button 
          onclick="openNotes(this)"
          data-id="${row.id}"
          data-notes='${encodeURIComponent(JSON.stringify(notes))}'
        >
          👁 عرض
        </button>
      </td>
      <td><button onclick="deleteRow(${row.id})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

loadData();
</script>

</body>
</html>
