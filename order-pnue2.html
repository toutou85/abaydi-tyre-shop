<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب شراء - عبايدي للعجلات</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    direction: rtl;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

img {
    width: 90%;
    border-radius: 10px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 90%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}

/* spinner */
.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top: 4px solid green;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* إشعار */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(220, 53, 69, 0.9);
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
    z-index: 999;
}
.toast.show {
    opacity: 1;
    transform: translateY(0);
}

/* خطأ */
.error {
    border: 2px solid red !important;
    background: #ffe6e6;
}

/* نافذة الملاحظة */
#noticePopup {
    display:none;
    width: 90%;
    margin-top: 10px;
    background: rgba(255, 255, 224, 0.7);
    border: 1.5px solid #ffc107;
    padding: 15px;
    border-radius: 12px;
    font-size: 13px;
}

/* زر جانبي */
#showNoticeBtn {
    position: fixed;
    left: 5px;
    top: 40%;
    background: rgba(255,193,7,0.6);
    border: none;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    display:none;
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.ibb.co/QjbNvZdc/20260329-060940-0000.png">

<!-- الملاحظة -->
<div id="noticePopup">
📌 <strong>ملاحظة هامة:</strong><br>
نظرًا لندرة العجلات 🛞🚗، نرجو من زبائننا الكرام تعبئة الطلبية مسبقًا 📝، وسيتم التواصل معكم فور توفرها 📞<br><br>
🚚 التوصيل متوفر إلى 58 ولاية<br>
💵 الدفع عند الاستلام
</div>

<h3>🛞 طلب شراء إطارات</h3>

<option value="23 - عنابة">23 - عنابة</option>
<option value="24 - قالمة">24 - قالمة</option>
<option value="25 - قسنطينة">25 - قسنطينة</option>
<option value="26 - المدية">26 - المدية</option>
<option value="27 - مستغانم">27 - مستغانم</option>

<select id="commune">
<option value="">اختر المكتب</option>
</select>

<input type="text" id="adresse" placeholder="العنوان">
<input type="text" id="type" placeholder="نوع الإطار">
<input type="text" id="size" placeholder="مقاس الإطار">
<input type="number" id="qty" placeholder="الكمية">

<button onclick="sendAll()">إرسال الطلب</button>

<div id="statusBox" style="display:none;text-align:center;">
<div class="spinner"></div>
<p id="statusText"></p>
</div>

</div>

<button id="showNoticeBtn">📌</button>
<div id="toast"></div>

<script>

// إشعار
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

// تحقق
function validateField(f){
if(!f.value.trim()){
f.classList.add("error");
return false;
}
f.classList.remove("error");
return true;
}

// إزالة الخطأ عند الكتابة
document.querySelectorAll("input,select").forEach(f=>{
f.addEventListener("input",()=>f.classList.remove("error"));
});

// إرسال
function sendAll(){

let fields=[name,phone,wilaya,commune,adresse,type,size,qty];
let firstError=null;

fields.forEach(f=>{
if(!validateField(f) && !firstError) firstError=f;
});

if(firstError){
showToast("⚠️ يرجى ملء جميع الخانات");
firstError.scrollIntoView({behavior:"smooth"});
firstError.focus();
return;
}

let box=document.getElementById("statusBox");
let text=document.getElementById("statusText");

box.style.display="block";
text.innerText="⏳ جاري الإرسال...";

setTimeout(()=>{
text.innerText="✅ تم إرسال الطلب";
},1500);

}

// الملاحظة
const notice=document.getElementById("noticePopup");
const btn=document.getElementById("showNoticeBtn");

window.onload=()=>{
notice.style.display="block";
setTimeout(()=>{
notice.style.display="none";
btn.style.display="block";
},5000);
};

btn.onclick=()=>{
notice.style.display="block";
btn.style.display="none";
setTimeout(()=>{
notice.style.display="none";
btn.style.display="block";
},5000);
};

</script>

</body>
</html>
