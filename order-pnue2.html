<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول احترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

h2 {
  text-align: center;
}

/* ===== جدول ===== */
.table-wrapper {
  overflow: auto;
  max-height: 80vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1400px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap; /* لا تقطع النص */
}

/* ===== شريط ثابت ===== */
th {
  background: #eee;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* ===== إخفاء الخانات الفارغة ===== */
.empty {
  display: none;
}

/* ===== زر ===== */
button {
  padding: 4px 8px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}

/* ===== textarea ===== */
textarea {
  width: 100%;
  height: 60px;
  resize: none;
}

/* ===== modal ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  width: 400px;
  margin: 10% auto;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: left;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>📋 جدول الطلبات</h2>

<div class="table-wrapper">
<table>

<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3>📌 الملاحظات</h3>
    <div id="notesBox"></div>
    <textarea id="newNote"></textarea>
    <br><br>
    <button onclick="addNote()">➕ إضافة</button>
    <button onclick="saveNotes()">💾 حفظ</button>
  </div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";

let allData = [];
let currentIndex = null;
let currentNotes = [];

/* ===== تحميل ===== */
function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {
    allData = data || [];
    renderTable();
  });
}

/* ===== عرض ===== */
function renderTable(){

  let html = "";

  allData.forEach((row, i)=>{

    let notes = [];

    try {
      notes = row.note ? JSON.parse(row.note) : [];
    } catch {
      notes = [];
    }

    let lastNote = notes.length ? notes[notes.length - 1].text : "";

    html += `
    <tr>

      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.commune || ""}</td>
      <td>${row.adresse || ""}</td>
      <td>${row.product || ""}</td>
      <td>${row.date || ""}</td>

      <td>
        ${lastNote || ""}
        <br>
        <button onclick="openNotes(${i})">👁 عرض</button>
      </td>

    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== فتح الملاحظات ===== */
function openNotes(index){

  currentIndex = index;

  let row = allData[index];

  try {
    currentNotes = row.note ? JSON.parse(row.note) : [];
  } catch {
    currentNotes = [];
  }

  renderNotes();
  document.getElementById("modal").style.display = "block";
}

/* ===== عرض الملاحظات ===== */
function renderNotes(){

  let html = "";

  currentNotes.forEach(n=>{
    html += `
      <div style="border-bottom:1px solid #ccc; padding:5px;">
        <b>${n.date}</b><br>
        ${n.text}
      </div>
    `;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* ===== إضافة ===== */
function addNote(){

  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text:text,
    date:new Date().toLocaleString()
  });

  document.getElementById("newNote").value = "";
  renderNotes();
}

/* ===== حفظ ===== */
function saveNotes(){

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index:currentIndex,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  }).then(()=> loadData());

  closeModal();
}

/* ===== إغلاق ===== */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== تشغيل ===== */
loadData();

</script>

</body>
</html>
