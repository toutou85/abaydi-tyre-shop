<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول pnue</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

input {
  width: 100%;
  border: none;
  outline: none;
}

button {
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📋 جدول الطلبات (pnue)</h2>

<table>
<thead>
<tr>
  <th>الاسم</th>
  <th>الهاتف 1</th>
  <th>الهاتف 2</th>
  <th>كود</th>
  <th>الولاية</th>
  <th>البلدية</th>
  <th>المنتج</th>
  <th>التاريخ</th>
  <th>الملاحظات</th>
  <th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>
const url = "https://script.google.com/macros/s/AKfycbxMvk18kFiQSqmvhFvukyqYGEUqdaLp7_pimMZqwKy7jODtzTQYQsTVX-d15hwrsulKyQ/exec";

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach((row, i) => {
        

html += `
<tr>
  <td>${row.name || ""}</td>
  <td>${row.phone || ""}</td>
  <td>${row.phone2 || ""}</td>
  <td>${row.code || ""}</td>
  <td>${row.wilaya || ""}</td>
  <td>${row.commune || ""}</td>
  <td>${row.product || ""}</td>
  <td>${row.date || ""}</td>

  

          <td>
            <input value="${row.note || ""}" 
            onchange="updateNote(${i}, this.value)">
          </td>

          <td>
            <button onclick="deleteRow(${i})">❌</button>
          </td>
        </tr>`;
      });

      document.getElementById("data").innerHTML = html;
    });
}

// تعديل note
function updateNote(index, note) {
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "update",
      index: index,
      note: note
    })
  });
}

// حذف صف
function deleteRow(index) {
  if(confirm("هل تريد حذف هذا الصف؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: index
      })
    }).then(() => loadData());
  }
}

loadData();
</script>

</body>
</html>
