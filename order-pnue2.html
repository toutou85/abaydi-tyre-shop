<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE TABLE</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

input {
  width: 100%;
  border: none;
  text-align: center;
  background: transparent;
}

textarea {
  width: 100%;
  height: 80px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #4CAF50;
  color: white;
  padding: 10px 20px;
  border-radius: 5px;
  display: none;
  z-index: 999;
}
</style>

</head>
<body>

<input 
  type="text" 
  id="search" 
  placeholder="🔍 ابحث هنا..." 
  onkeyup="applyFilters()"
>

<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<div id="toast"></div>

<button onclick="loadMore()">⬇️ عرض المزيد</button>

<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";

let allData = [];
let visibleCount = 5;

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      allData = data || [];
      renderTable(allData);
    })
    .catch(err => {
      console.error("خطأ:", err);
    });
}

// عرض الجدول
function renderTable(data) {

  let html = "";

  let sorted = [...data].sort((a,b)=> new Date(b.date) - new Date(a.date));

  let limited = sorted.slice(0, visibleCount);

  limited.forEach((row, index) => {

    html += `
    <tr>
      <td><input value="${row.name || ''}" onchange="updateRow(${index},'name',this.value)"></td>
      <td><input value="${row.phone || ''}" onchange="updateRow(${index},'phone',this.value)"></td>
      <td><input value="${row.wilaya || ''}" onchange="updateRow(${index},'wilaya',this.value)"></td>
      <td><input value="${row.commune || ''}" onchange="updateRow(${index},'commune',this.value)"></td>
      <td><input value="${row.adresse || ''}" onchange="updateRow(${index},'adresse',this.value)"></td>
      <td><input value="${row.product || ''}" onchange="updateRow(${index},'product',this.value)"></td>
      <td><input value="${row.date || ''}" onchange="updateRow(${index},'date',this.value)"></td>

      <td>
        <textarea onchange="updateRow(${index},'note',this.value)">
        ${row.note || ''}
        </textarea>
      </td>

      <td><button onclick="deleteRow(${index})">❌</button></td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

// عرض المزيد
function loadMore(){
  visibleCount += 5;
  renderTable(allData);
}

// تعديل
function updateRow(index, field, value){

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: index,
      field: field,
      value: value
    })
  })
  .then(()=> showToast("تم الحفظ"));
}

// حذف
function deleteRow(index){
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      body: JSON.stringify({
        action:"delete",
        index:index
      })
    }).then(()=> loadData());
  }
}

// بحث
function applyFilters(){

  let search = document.getElementById("search").value.toLowerCase();

  let filtered = allData.filter(r =>
    (r.name || "").toLowerCase().includes(search) ||
    (r.phone || "").toLowerCase().includes(search) ||
    (r.product || "").toLowerCase().includes(search)
  );

  renderTable(filtered);
}

// Toast
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=> t.style.display="none", 2000);
}

// تشغيل
loadData();

</script>

</body>
</html>
