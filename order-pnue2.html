<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول الطلبات</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

/* ===== شريط تمرير ثابت ===== */
.table-wrapper {
  width: 100%;
  overflow-x: auto;
  overflow-y: hidden; /* مهم لمنع النزول */
  background: #fff;
  border: 1px solid #ccc;
}

/* عرض الجدول أكبر من الشاشة */
table {
  min-width: 1500px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #eee;
}

input {
  width: 100%;
  border: none;
  background: transparent;
  text-align: center;
}

button {
  padding: 5px 10px;
  background: red;
  color: #fff;
  border: none;
  cursor: pointer;
  margin: 3px;
}

button:hover {
  background: darkred;
}

#search {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

/* ===== Modal ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  padding: 20px;
  width: 450px;
  margin: 8% auto;
  border-radius: 10px;
}

.modal textarea {
  width: 100%;
  height: 80px;
}

.close {
  float: left;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📋 جدول الطلبات</h2>

<input type="text" id="search" placeholder="🔍 بحث..." onkeyup="applyFilters()">

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>ترقيم</th>
<th>ID</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h3>📌 الملاحظات</h3>

    <div id="modalData" style="max-height:200px; overflow-y:auto;"></div>

    <textarea id="newNote"></textarea>

    <br><br>
    <button onclick="addNote()">➕ إضافة</button>
    <button onclick="saveNotes()">💾 حفظ</button>
    <button onclick="deleteNotes()">🗑 حذف</button>
  </div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let currentRowId = null;
let currentNotes = [];

function loadData(){
  fetch(url)
  .then(res => res.json())
  .then(data => {
    allData = data || [];
    renderTable();
  })
  .catch(err => {
    console.log("خطأ في جلب البيانات", err);
  });
}

function renderTable(){

  let html = "";

  let sorted = [...allData].sort((a,b) => b.id - a.id);

  sorted.forEach((row, index) => {

    let notes = [];

    try {
      notes = Array.isArray(row.note) ? row.note : JSON.parse(row.note || "[]");
    } catch {
      notes = [];
    }

    let lastNote = notes.length ? notes[notes.length - 1].text : "";

    html += `
    <tr>
      <td>${index + 1}</td>
      <td>${row.id || ""}</td>
      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.commune || ""}</td>
      <td>${row.adresse || ""}</td>
      <td>${row.product || ""}</td>
      <td>${row.date || ""}</td>

      <td>
        ${lastNote}
        <br>
        <button onclick='openNotes(${row.id}, "${btoa(unescape(encodeURIComponent(JSON.stringify(notes))))}")'>
          👁 عرض
        </button>
      </td>

      <td><button onclick="deleteRow(${row.id})">❌</button></td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== ملاحظات ===== */
function openNotes(id, notes){
  currentRowId = id;

  try {
    let decoded = decodeURIComponent(escape(atob(notes)));
    currentNotes = JSON.parse(decoded) || [];
  } catch {
    currentNotes = [];
  }

  renderNotes();
  document.getElementById("modal").style.display = "block";
}

function renderNotes(){
  let html = "";

  currentNotes.forEach(n => {
    html += `<div style="border-bottom:1px solid #ccc; padding:5px;">
      <b>${n.date}</b><br>
      ${n.text}
    </div>`;
  });

  document.getElementById("modalData").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text: text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value = "";
  renderNotes();
}

function saveNotes(){
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: currentRowId,
      field: "note",
      value: JSON.stringify(currentNotes)
    })
  }).then(loadData);

  closeModal();
}

function deleteNotes(){
  currentNotes = [];
  renderNotes();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== حذف ===== */
function deleteRow(id){
  if(confirm("حذف؟")){
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: id
      })
    }).then(loadData);
  }
}

/* ===== بحث ===== */
function applyFilters(){
  let val = document.getElementById("search").value.toLowerCase();

  if(!val){
    renderTable();
    return;
  }

  let filtered = allData.filter(r =>
    (r.product || "").toLowerCase().includes(val)
  );

  allData = filtered;
  renderTable();
}

/* تشغيل */
loadData();

</script>

</body>
</html>
