<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام PNUE الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button {
  padding: 8px;
}

.table-wrapper {
  overflow-x: auto;
  max-height: 75vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1500px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
  z-index: 2;
}

button {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: darkred;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: #fff;
  width: 500px;
  margin: 5% auto;
  padding: 15px;
  border-radius: 10px;
}

.close {
  float: left;
  cursor: pointer;
}

.note-item {
  border-bottom: 1px solid #ccc;
  padding: 5px;
}
</style>

</head>

<body>

<h2 style="text-align:center;">📊 نظام PNUE الاحترافي</h2>

<div class="controls">

<input type="text" id="search" placeholder="🔍 بحث..." oninput="render()">

<select id="filter" onchange="render()">
  <option value="all">📄 الكل</option>
  <option value="has">📝 فيه ملاحظات</option>
  <option value="no">🚫 بدون ملاحظات</option>
</select>

<button onclick="showMore()">عرض المزيد</button>
<button onclick="showAll()">عرض الكل</button>

</div>

<div class="table-wrapper">
<table>

<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<h3>📌 الملاحظات</h3>

<div id="notesBox"></div>

<textarea id="newNote" style="width:100%;height:80px;"></textarea>

<br><br>

<button onclick="addNote()">➕ إضافة</button>
<button onclick="saveNotes()">💾 حفظ</button>

</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let limit = 10;
let currentIndex = null;
let currentNotes = [];

/* ===== تحميل ===== */
function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {

    allData = data || [];

    // ✅ الأحدث أولاً (آخر سطر في Google Sheets)
    allData.reverse();

    render();
  });
}

/* ===== عرض ===== */
function render(){

  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let html = "";
  let count = 0;

  allData.forEach((row,i)=>{

    let notes = [];

    // ✅ إصلاح قراءة الملاحظات (JSON + نص عادي)
    if(row.note){
      try {
        notes = JSON.parse(row.note);
        if(!Array.isArray(notes)) notes = [{text: row.note, date:""}];
      } catch {
        notes = [{text: row.note, date:""}];
      }
    }

    let lastNote = notes.length ? notes[notes.length-1].text : "";

    // فلتر
    if(filter==="has" && notes.length===0) return;
    if(filter==="no" && notes.length>0) return;

    // بحث
    let text = Object.values(row).join(" ").toLowerCase();
    if(!text.includes(search)) return;

    // عرض 10 فقط
    if(count >= limit) return;

    count++;

    html += `
    <tr>

      <td>${count}</td>

      <td>${row.name||""}</td>
      <td>${row.phone||""}</td>
      <td>${row.wilaya||""}</td>
      <td>${row.commune||""}</td>
      <td>${row.adresse||""}</td>
      <td>${row.product||""}</td>
      <td>${row.date||""}</td>

      <td>
        ${lastNote}
        <br>
        <button onclick="openNotes(${i})">👁 عرض</button>
      </td>

      <td>
        <button onclick="deleteRow(${i})">❌</button>
      </td>

    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== عرض المزيد ===== */
function showMore(){
  limit += 10;
  render();
}

function showAll(){
  limit = 100000;
  render();
}

/* ===== حذف ===== */
function deleteRow(i){
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      body: JSON.stringify({
        action:"delete",
        index:i
      })
    }).then(()=>loadData());
  }
}

/* ===== ملاحظات ===== */
function openNotes(i){

  currentIndex = i;

  let notes = [];

  if(allData[i].note){
    try {
      notes = JSON.parse(allData[i].note);
      if(!Array.isArray(notes)) notes = [{text: allData[i].note, date:""}];
    } catch {
      notes = [{text: allData[i].note, date:""}];
    }
  }

  currentNotes = notes;

  renderNotes();
  document.getElementById("modal").style.display="block";
}

function renderNotes(){

  let html = "";

  currentNotes.forEach((n,index)=>{
    html += `
    <div class="note-item">
      <b>${n.date || ""}</b><br>
      ${n.text}
      <br>
      <button onclick="deleteNote(${index})">❌</button>
    </div>
    `;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* ===== إضافة ===== */
function addNote(){

  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

/* ===== حذف ملاحظة ===== */
function deleteNote(index){
  currentNotes.splice(index,1);
  renderNotes();
}

/* ===== حفظ ===== */
function saveNotes(){

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"updateAll",
      index: currentIndex,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  }).then(()=> loadData());

  closeModal();
}

/* ===== إغلاق ===== */
function closeModal(){
  document.getElementById("modal").style.display="none";
}

loadData();

</script>

</body>
</html>
