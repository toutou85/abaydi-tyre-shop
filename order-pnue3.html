<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE TABLE</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

input {
  width: 100%;
  border: none;
  text-align: center;
  background: transparent;
}

input:focus {
  background: #ffffcc;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #4CAF50;
  color: white;
  padding: 10px 20px;
  border-radius: 5px;
  display: none;
  z-index: 999;
}
</style>

</head>
<body>
<input 
  type="text" 
  id="search" 
  placeholder="🔍 ابحث هنا..." 
 
onkeyup="applyFilters()"
  style="width:100%; padding:10px; margin-bottom:10px; font-size:16px;"
>
<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف1</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>
  المنتج ⬇️
  <br>
  <select id="productSelect" onchange="applyFilters()"
>
    <option value="">الكل</option>
  </select>
</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
<div id="toast">✅ تم حفظ التعديل</div>
<button onclick="loadMore()" style="margin-top:10px; padding:10px;">
  ⬇️ عرض المزيد
</button>
<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";


let allData = [];
let visibleCount = 5;
// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      allData = data; // تخزين البيانات

      renderTable();
    })
    .catch(err => {
      alert("❌ خطأ في تحميل البيانات");
      console.error(err);
    });
}




// تعديل

function updateRow(index, field, value) {

  if (field === "note") {
    let now = new Date();
    let formattedDate = formatDate(now);
    value = value + "\n🕒 " + formattedDate + "\n-----------------\n";
  }

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: index,
      field: field,
      value: value
    })
  })
  .then(() => {
    showToast("✅ تم حفظ التعديل");
  })
  .catch(() => {
    showToast("❌ خطأ في الحفظ");
  });
}
function showToast(message = "✅ تم الحفظ") {
  let toast = document.getElementById("toast");
  toast.innerText = message;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}
function formatDate(dateString) {
  if (!dateString) return "";

  let date = new Date(dateString);

  let y = date.getFullYear();
  let m = String(date.getMonth() + 1).padStart(2, '0');
  let d = String(date.getDate()).padStart(2, '0');

  let h = String(date.getHours()).padStart(2, '0');
  let min = String(date.getMinutes()).padStart(2, '0');

  return `${y}-${m}-${d} ${h}:${min}`;
}


function applyFilters() {
  let search = document.getElementById("search").value.toLowerCase();
  let selected = document.getElementById("productSelect").value.toLowerCase();

  let rows = document.querySelectorAll("#data tr");

  rows.forEach(row => {
    let text = row.innerText.toLowerCase();
    let productText = row.children[5].innerText.toLowerCase();

    let matchSearch = text.includes(search);
    let matchProduct = (selected === "" || productText === selected);

    if (matchSearch && matchProduct) {
      row.style.display = "";
    } else {
      row.style.display = "none";
    }
  });
}
function renderTable() {
  let html = "";
  let productSet = new Set();

  // إضافة index الأصلي
  let sorted = allData.map((row, i) => ({ ...row, originalIndex: i }));

  sorted.sort((a, b) => {
    let dateA = new Date(a.date);
    let dateB = new Date(b.date);
    return dateB - dateA;
  });

  let limited = sorted.slice(0, visibleCount);

  limited.forEach((row) => {

    if (row.product) productSet.add(row.product);

    html += `
    <tr>
      <td><input value="${row.name || ''}" onchange="updateRow(${row.originalIndex},'name',this.value)"></td>
      <td><input value="${row.phone || ''}" onchange="updateRow(${row.originalIndex},'phone',this.value)"></td>
      <td><input value="${row.wilaya || ''}" onchange="updateRow(${row.originalIndex},'wilaya',this.value)"></td>
      <td><input value="${row.commune || ''}" onchange="updateRow(${row.originalIndex},'commune',this.value)"></td>
      <td><input value="${row.adresse || ''}" onchange="updateRow(${row.originalIndex},'adresse',this.value)"></td>
      <td><input value="${row.product || ''}" onchange="updateRow(${row.originalIndex},'product',this.value)"></td>
      <td><input value="${formatDate(row.date) || ''}" onchange="updateRow(${row.originalIndex},'date',this.value)"></td>
      <td>
        <textarea oninput="updateRow(${row.originalIndex},'note',this.value)">${row.note || ''}</textarea>
      </td>
      <td><button onclick="deleteRow(${row.originalIndex})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;

  // قائمة المنتجات
  let select = document.getElementById("productSelect");
  select.innerHTML = `<option value="">الكل</option>`;

  productSet.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });
}

  document.getElementById("data").innerHTML = html;

  // تحديث قائمة المنتجات
  let select = document.getElementById("productSelect");
  select.innerHTML = `<option value="">الكل</option>`;

  productSet.forEach(p => {
    select.innerHTML += `<option value="${p}">${p}</option>`;
  });
}
// حذف
function deleteRow(index) {
  if(confirm("هل تريد حذف هذا الصف؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: index
      })
    }).then(() => loadData());
  }
}

// تشغيل
loadData();

</script>

</body>
</html>
