<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تجربة حفظ الملاحظات</title>
</head>
<body>

<h2>💾 تجربة حفظ الملاحظات</h2>

<textarea id="note" style="width:300px; height:100px;"></textarea>
<br><br>
<button onclick="saveNote()">💾 حفظ</button>

<script>
const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

function saveNote(){
    let noteText = document.getElementById("note").value.trim();
    if(!noteText){
        alert("✏️ أدخل ملاحظة أولاً");
        return;
    }

    let f = new FormData();
    f.append("action", "updateAll");  // حسب سكربتك
    f.append("index", 0);             // رقم تجريبي للصف
    f.append("field", "note");
    f.append("value", JSON.stringify([{text: noteText, date: new Date().toLocaleString()}]));

    fetch(url, { method: "POST", body: f })
    .then(r => r.text())
    .then(res => {
        console.log("Response:", res);
        alert("✅ تم الحفظ بنجاح");
    })
    .catch(err => {
        console.error(err);
        alert("❌ حدث خطأ عند الحفظ");
    });
}
</script>

</body>
</html>
