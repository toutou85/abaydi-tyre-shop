<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تجربة حفظ الملاحظات JSON</title>
</head>
<body>

<h2>💾 تجربة حفظ الملاحظات (JSON)</h2>

<textarea id="note" style="width:300px; height:100px;"></textarea>
<br><br>
<button onclick="saveNote()">💾 حفظ</button>

<script>
const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

function saveNote(){
    let noteText = document.getElementById("note").value.trim();
    if(!noteText){
        alert("✏️ أدخل ملاحظة أولاً");
        return;
    }

    fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "updateAll",
            index: 0,  // رقم الصف التجريبي
            field: "note",
            value: JSON.stringify([{text: noteText, date: new Date().toLocaleString()}])
        })
    })
    .then(r => r.text())
    .then(res => {
        console.log("Response:", res);
        alert("✅ تم الحفظ بنجاح");
    })
    .catch(err => {
        console.error(err);
        alert("❌ حدث خطأ عند الحفظ");
    });
}
</script>

</body>
</html>
