<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام PNUE الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button {
  padding: 8px;
}

.table-wrapper {
  overflow-x: auto;
  max-height: 75vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1500px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
  z-index: 2;
}

button {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: darkred;
}

/* ===== Modal FIXED ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 99999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);

  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 500px;
  padding: 15px;
  border-radius: 10px;
}

.note-item {
  border-bottom: 1px solid #ccc;
  padding: 5px;
}
</style>

</head>

<body>

<h2 style="text-align:center;">📊 نظام PNUE الاحترافي</h2>
<div id="topMsg" style="
position:fixed;
top:-80px;
left:0;
width:100%;
text-align:center;
background:#28a745;
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
transition:0.5s;
z-index:999999;
">
✅ تم حفظ الملاحظات بنجاح
</div>

<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>
<div class="controls">

<input type="text" id="search" placeholder="🔍 بحث..." oninput="render()">

<select id="filter" onchange="render()">
  <option value="all">📄 الكل</option>
  <option value="has">📝 فيه ملاحظات</option>
  <option value="no">🚫 بدون ملاحظات</option>
</select>

<button onclick="showMore()">عرض المزيد</button>
<button onclick="showAll()">عرض الكل</button>

</div>

<div class="table-wrapper">
<table>

<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">

<h3>📌 الملاحظات</h3>

<div id="notesBox"></div>

<textarea id="newNote" style="width:100%;height:80px;"></textarea>

<br><br>

<button onclick="addNote()">➕ إضافة</button>
<button onclick="saveNotes()">💾 حفظ</button>
<button onclick="closeModal()">✖ إغلاق</button>

</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let limit = 10;
let currentIndex = null;
let currentNotes = [];

/* ===== تنظيف القيم ===== */
function clean(val){
  return (val && val !== "null" && val !== "undefined") ? val : "";
}

/* ===== تحميل ===== */
function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {

    if(!Array.isArray(data)){
      console.error("DATA ERROR", data);
      return;
    }

    allData = data.filter(row => {
      let values = Object.entries(row)
        .filter(([key]) => key !== "id")
        .map(([_, v]) => v);

      return values.some(v => v && v.toString().trim() !== "");
    });

    allData.reverse();
    render();
  })
  .catch(err=>{
    console.error("LOAD ERROR:", err);
  });
}

/* ===== استخراج الملاحظات ===== */
function getNotes(note){
  if(!note) return [];

  try {
    let parsed = JSON.parse(note);
    if(Array.isArray(parsed)) return parsed;
    return [{text: note, date:""}];
  } catch {
    return [{text: note, date:""}];
  }
}

/* ===== عرض ===== */
function render(){

  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let filtered = [];

  allData.forEach((row,i)=>{

    let notes = getNotes(row.note);

    if(filter==="has" && notes.length===0) return;
    if(filter==="no" && notes.length>0) return;

    let text = Object.values(row).join(" ").toLowerCase();
    if(!text.includes(search)) return;

    filtered.push({row, i, notes});
  });

  let sliced = filtered.slice(0, limit);

  let html = "";

  sliced.forEach((item,index)=>{

    let lastNote = item.notes.length ? item.notes[item.notes.length-1].text : "";

    html += `
    <tr>

      <td>${index+1}</td>

      <td>${clean(item.row.name)}</td>
      <td>${clean(item.row.phone)}</td>
      <td>${clean(item.row.wilaya)}</td>
      <td>${clean(item.row.commune)}</td>
      <td>${clean(item.row.adresse)}</td>
      <td>${clean(item.row.product)}</td>
      <td>${clean(item.row.date)}</td>

      <td>
        ${lastNote}
        <br>
        <button onclick="openNotes(${item.i})">👁 عرض</button>
      </td>

      <td>
        <button onclick="deleteRow(${item.i})">❌</button>
      </td>

    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

/* ===== عرض المزيد ===== */
function showMore(){
  limit += 10;
  render();
}

function showAll(){
  limit = allData.length;
  render();
}

/* ===== حذف ===== */
function deleteRow(i){

  if(confirm("حذف؟")){

    let formData = new FormData();
    formData.append("action", "delete");
    formData.append("index", i);

    fetch(url,{
      method:"POST",
      body: formData
    })
    .then(res=>res.text())
    .then(res=>{
      console.log("DELETE:", res);
      loadData();
    });

  }
}

/* ===== ملاحظات ===== */
function openNotes(i){

  currentIndex = i;
  currentNotes = getNotes(allData[i].note);

  renderNotes();

  let modal = document.getElementById("modal");
  modal.style.display = "flex";
}

function renderNotes(){

  let html = "";

  currentNotes.forEach((n,index)=>{
    html += `
    <div class="note-item">
      <b>${n.date || ""}</b><br>
      ${n.text}
      <br>
      <button onclick="deleteNote(${index})">❌</button>
    </div>
    `;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* ===== إضافة ===== */
function addNote(){

  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

/* ===== حذف ملاحظة ===== */
function deleteNote(index){
  currentNotes.splice(index,1);
  renderNotes();
}

/* ===== حفظ ===== */
function saveNotes(){

  let formData = new FormData();

  formData.append("action", "updateAll");
  formData.append("index", currentIndex);
  formData.append("field", "note");
  formData.append("value", JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body: formData
  })
  .then(res => res.text())
  .then(res => {

    console.log("SERVER:", res); // 🔍 مهم للتشخيص

    if(res.includes("updated") || res.includes("ok")){
      showTopMessage("✅ تم حفظ الملاحظات بنجاح");
      loadData();
      closeModal();
    } else {
      showTopMessage("❌ فشل الحفظ", "red");
    }

  })
  .catch(err=>{
    console.error(err);
    showTopMessage("❌ خطأ في الاتصال", "red");
  });
}

/* ===== إغلاق ===== */
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ===== تشغيل ===== */
loadData();
function showTopMessage(text, color="#28a745"){

  let msg = document.getElementById("topMsg");

  msg.innerText = text;
  msg.style.background = color;

  // نزول الرسالة
  msg.style.top = "0";

  // صوت
  document.getElementById("successSound").play();

  // اختفاء
  setTimeout(()=>{
    msg.style.top = "-80px";
  }, 2500);
}
let saving = false;

function saveNotes(){

  if(saving) return;
  saving = true;

  let formData = new FormData();

  formData.append("action", "updateAll");
  formData.append("index", currentIndex);
  formData.append("field", "note");
  formData.append("value", JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body: formData
  })
  .then(res => res.text())
  .then(res => {

    saving = false;

    if(res.includes("updated") || res.includes("ok")){
      showTopMessage("✅ تم الحفظ");
      loadData();
      closeModal();
    } else {
      showTopMessage("❌ فشل", "red");
    }

  })
  .catch(()=>{
    saving = false;
    showTopMessage("❌ خطأ", "red");
  });
}
</script>

</body>
</html>
