<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام PNUE الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button {
  padding: 8px;
}

.table-wrapper {
  overflow-x: auto;
  max-height: 75vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1500px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

button {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 500px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">📊 نظام PNUE الاحترافي</h2>

<div id="topMsg" style="position:fixed;top:-80px;width:100%;text-align:center;background:#28a745;color:white;padding:15px;transition:0.5s;">
تم الحفظ
</div>

<div class="controls">
<input type="text" id="search" placeholder="بحث..." oninput="render()">
<select id="filter" onchange="render()">
<option value="all">الكل</option>
<option value="has">فيه ملاحظات</option>
<option value="no">بدون ملاحظات</option>
</select>
<button onclick="showMore()">عرض المزيد</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">
<h3>الملاحظات</h3>
<div id="notesBox"></div>
<textarea id="newNote" style="width:100%;height:80px;"></textarea>
<br><br>
<button onclick="addNote()">إضافة</button>
<button onclick="saveNotes()">حفظ</button>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec";

let allData = [];
let limit = 10;
let currentIndex = null;
let currentNotes = [];
let saving = false;

function loadData(){
  fetch(url)
  .then(r => r.json())
  .then(data => {
    allData = data.reverse();
    render();
  });
}

function getNotes(note){
  try {
    return JSON.parse(note) || [];
  } catch {
    return [];
  }
}

function render(){
  let html = "";
  let filtered = [];

  allData.forEach((row,i)=>{
    filtered.push({...row, realIndex:i});
  });

  filtered.slice(0,limit).forEach((row,index)=>{
    let notes = getNotes(row.note);
    let last = notes.length ? notes[notes.length-1].text : "";

    html += `
    <tr>
      <td>${index+1}</td>
      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.product || ""}</td>
      <td>${row.date || ""}</td>
      <td>
        ${last}<br>
        <button onclick="openNotes(${row.realIndex})">عرض</button>
      </td>
      <td>
        <button onclick="deleteRow(${row.realIndex})">X</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function showMore(){
  limit += 10;
  render();
}

function openNotes(i){
  currentIndex = i;
  currentNotes = getNotes(allData[i].note);
  renderNotes();
  document.getElementById("modal").style.display = "flex";
}

function renderNotes(){
  let html = "";
  currentNotes.forEach((n,i)=>{
    html += `<div>${n.text} <button onclick="deleteNote(${i})">X</button></div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

function saveNotes(){

  if(saving) return;
  saving = true;

  let formData = new FormData();
  formData.append("action","updateAll");
  formData.append("index",currentIndex);
  formData.append("field","note");
  formData.append("value",JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body: formData
  })
  .then(res=>res.text())
  .then(res=>{
    saving=false;
    console.log(res);

    showMsg("تم الحفظ");
    loadData();
    closeModal();
  })
  .catch(()=>{
    saving=false;
    showMsg("خطأ","red");
  });
}

function deleteRow(i){
  let formData = new FormData();
  formData.append("action","delete");
  formData.append("index",i);

  fetch(url,{method:"POST",body:formData})
  .then(()=>loadData());
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function showMsg(text,color="#28a745"){
  let m = document.getElementById("topMsg");
  m.innerText=text;
  m.style.background=color;
  m.style.top="0";
  setTimeout(()=>m.style.top="-80px",2000);
}

loadData();

</script>

</body>
</html>
