
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام PNUE الاحترافي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f4f4f4;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

input, select, button, textarea {
  padding: 8px;
}

button {
  background: #d9534f;
  color: white;
  border: none;
}

.table-wrapper {
  overflow-x: auto;
  background: white;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 15px;
  width: 90%;
  max-width: 400px;
}

#topMsg {
  position: fixed;
  top: -60px;
  width: 100%;
  text-align: center;
  color: white;
  padding: 10px;
  transition: 0.3s;
}
</style>
</head>

<body>

<h2>📊 PNUE</h2>

<div id="topMsg"></div>

<div class="controls">
<input id="search" placeholder="بحث..." oninput="render()">
<button onclick="showMore()">المزيد</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>المنتج</th>
<th>ملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<div id="modal" class="modal">
<div class="modal-content">

<div id="notesBox"></div>

<textarea id="newNote"></textarea><br>

<button onclick="addNote()">إضافة</button>
<button onclick="saveNotes()">حفظ</button>
<button onclick="closeModal()">إغلاق</button>

</div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxemQjuiy6IRq0gCvG9nMmeHkHuyQKKeh40jNde_1NYi7GiNy8EyIAEBEMBM6AXZQJ2/exec";

let allData = [];
let limit = 10;
let currentRow = null;
let currentNotes = [];

function loadData(){
  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    allData = data.reverse();
    render();
  });
}

function getNotes(n){
  try { return JSON.parse(n) || []; }
  catch { return []; }
}

function render(){
  let html = "";
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = allData.filter(r =>
    r.name?.toLowerCase().includes(search) ||
    r.phone?.includes(search) ||
    r.product?.toLowerCase().includes(search)
  );

  filtered.slice(0,limit).forEach((row,i)=>{

    let notes = getNotes(row.note);
    let last = notes.length ? notes[notes.length-1].text : "";

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${row.name}</td>
      <td>${row.phone}</td>
      <td>${row.product}</td>
      <td>${last}<br>
        <button onclick="openNotes(${row.row})">عرض</button>
      </td>
      <td>
        <button onclick="deleteRow(${row.row})">X</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function showMore(){
  limit += 10;
  render();
}

function openNotes(rowNumber){
  currentRow = rowNumber;
  let row = allData.find(r => r.row === rowNumber);
  currentNotes = getNotes(row.note);

  renderNotes();
  document.getElementById("modal").style.display = "flex";
}

function renderNotes(){
  let html = "";
  currentNotes.forEach((n,i)=>{
    html += `<div>${n.text} <button onclick="deleteNote(${i})">X</button></div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value.trim();
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

function saveNotes(){
  fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"updateAll",
      index: currentRow,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  })
  .then(()=> {
    showMsg("تم الحفظ");
    loadData();
    closeModal();
  })
  .catch(()=> showMsg("خطأ","red"));
}

function deleteRow(row){
  fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"delete",
      index: row
    })
  }).then(()=>loadData());
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function showMsg(t,c="green"){
  let m = document.getElementById("topMsg");
  m.innerText = t;
  m.style.background = c;
  m.style.top="0";

  setTimeout(()=>m.style.top="-60px",2000);
}

loadData();
</script>

</body>
</html>
