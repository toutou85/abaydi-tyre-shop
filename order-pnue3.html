<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جدول pnue</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th {
  background: #eee;
}

input {
  width: 100%;
  border: none;
  outline: none;
  text-align: center;
  background: transparent;
}

input:focus {
  background: #ffffcc;
}

button {
  padding: 5px 10px;
  cursor: pointer;
  border: none;
  background: red;
  color: white;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}
</style>
</head>

<body>

<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
  <th>الاسم</th>
  <th>الهاتف 1</th>
  <th>الهاتف 2</th>
  <th>كود</th>
  <th>الولاية</th>
  <th>البلدية</th>
  <th>المنتج</th>
  <th>التاريخ</th>
  <th>الملاحظات</th>
  <th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const url = "https://script.google.com/macros/s/AKfycbxJQrUuXY5YsbU3OOb7mabGdHV23qqbjj7e0MRZzgE4Lz3kezIHeFQgMFJlq_VLUrPSWg/exec";

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach((row, i) => {
        html += `
        <tr>
          <td><input value="${row.name || ""}" onchange="updateRow(${i}, 'name', this.value)"></td>
          <td><input value="${row.phone || ""}" onchange="updateRow(${i}, 'phone', this.value)"></td>
          <td><input value="${row.phone2 || ""}" onchange="updateRow(${i}, 'phone2', this.value)"></td>
          <td><input value="${row.code || ""}" onchange="updateRow(${i}, 'code', this.value)"></td>
          <td><input value="${row.wilaya || ""}" onchange="updateRow(${i}, 'wilaya', this.value)"></td>
          <td><input value="${row.commune || ""}" onchange="updateRow(${i}, 'commune', this.value)"></td>
          <td><input value="${row.product || ""}" onchange="updateRow(${i}, 'product', this.value)"></td>
          <td><input value="${row.date || ""}" onchange="updateRow(${i}, 'date', this.value)"></td>
          <td><input value="${row.note || ""}" onchange="updateRow(${i}, 'note', this.value)"></td>
          <td><button onclick="deleteRow(${i})">❌</button></td>
        </tr>`;
      });

      document.getElementById("data").innerHTML = html;
    });
}

// تحديث أي خانة
function updateRow(index, field, value) {
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: index,
      field: field,
      value: value
    })
  });
}

// حذف صف
function deleteRow(index) {
  if (confirm("هل تريد حذف هذا الصف؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: index
      })
    }).then(() => loadData());
  }
}

// تشغيل عند فتح الصفحة
loadData();

</script>

</body>
</html>
