<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE</title>

<style>
body {font-family: Arial; direction: rtl; background:#f4f4f4; padding:10px;}
input,button {padding:8px; margin:5px;}
table {width:100%; border-collapse:collapse;}
th,td {border:1px solid #ccc; padding:6px; text-align:center;}
.modal {display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;}
.modal-content {background:#fff; padding:15px; width:90%; max-width:400px;}
</style>
</head>

<body>

<h2>📊 PNUE</h2>

<input id="search" placeholder="بحث..." oninput="render()">

<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>المنتج</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<!-- مودال -->
<div id="modal" class="modal">
<div class="modal-content">

<div id="notesBox"></div>

<textarea id="newNote" style="width:100%;height:80px;"></textarea><br>

<button onclick="addNote()">➕ إضافة</button>
<button onclick="saveNotes()">💾 حفظ</button>
<button onclick="closeModal()">✖ إغلاق</button>

</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby0DsqCOpRzVZu-66OcHhe0VCbH18vvfhNe6O6y-BoXaCTYrKM9_-23UA6B91Qavs6e/exec";

let allData = [];
let currentRow = null;
let currentNotes = [];

/* تحميل البيانات */
function loadData(){
  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    allData = data.reverse();
    render();
  });
}

/* استخراج الملاحظات */
function getNotes(n){
  try { return JSON.parse(n) || []; }
  catch { return []; }
}

/* عرض الجدول */
function render(){

  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  allData.forEach((row,i)=>{

    let notes = getNotes(row.note);
    let last = notes.length ? notes[notes.length-1].text : "";

    let text = Object.values(row).join(" ").toLowerCase();
    if(!text.includes(search)) return;

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.product || ""}</td>

      <td>
        ${last}<br>
        <button onclick="openNotes(${i})">👁 عرض</button>
      </td>

      <td>
        <button onclick="deleteRow(${i})">❌</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

/* فتح الملاحظات */
function openNotes(index){

  let row = allData[index];

  currentRow = row.row; // 🔥 الصف الحقيقي

  currentNotes = getNotes(row.note);

  renderNotes();

  document.getElementById("modal").style.display="flex";
}

/* عرض الملاحظات */
function renderNotes(){

  let html = "";

  currentNotes.forEach((n,i)=>{
    html += `
    <div>
      <b>${n.date || ""}</b><br>
      ${n.text}
      <br>
      <button onclick="deleteNote(${i})">❌</button>
    </div>`;
  });

  document.getElementById("notesBox").innerHTML = html;
}

/* إضافة */
function addNote(){

  let text = document.getElementById("newNote").value.trim();
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

/* حذف ملاحظة */
function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

/* حفظ */
function saveNotes(){

  let f = new FormData();

  f.append("action","updateAll");
  f.append("index", currentRow);
  f.append("field","note");
  f.append("value", JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body:f
  })
  .then(()=>{
    alert("✅ تم الحفظ");
    loadData();
    closeModal();
  })
  .catch(()=>{
    alert("❌ خطأ في الاتصال");
  });
}

/* حذف صف */
function deleteRow(index){

  let rowNumber = allData[index].row;

  let f = new FormData();
  f.append("action","delete");
  f.append("index", rowNumber);

  fetch(url,{
    method:"POST",
    body:f
  })
  .then(()=>loadData());
}

/* إغلاق */
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* تشغيل */
loadData();

</script>

</body>
</html>
