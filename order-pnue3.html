function saveNotes(){

  let f = new FormData();
  f.append("action","updateAll");
  f.append("index", currentRow);
  f.append("field","note");
  f.append("value", JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body:f
  })
  .then(()=>{
    alert("✅ تم الحفظ");
    loadData();
    closeModal();
  });
}
