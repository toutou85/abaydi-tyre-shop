<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE</title>

<style>
body {font-family: Arial; direction: rtl; background:#f4f4f4; padding:10px;}
.controls {display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
input,select,button {padding:8px;}
table {width:100%; border-collapse:collapse;}
th,td {border:1px solid #ccc; padding:6px; text-align:center;}
.modal {display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;}
.modal-content {background:#fff; padding:15px; width:90%; max-width:400px;}
</style>
</head>

<body>

<h2>📊 PNUE</h2>

<input id="search" placeholder="بحث..." oninput="render()">

<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>المنتج</th>
<th>ملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<div id="modal" class="modal">
<div class="modal-content">

<div id="notesBox"></div>

<textarea id="newNote"></textarea><br>

<button onclick="addNote()">إضافة</button>
<button onclick="saveNotes()">حفظ</button>
<button onclick="closeModal()">إغلاق</button>

</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycby0DsqCOpRzVZu-66OcHhe0VCbH18vvfhNe6O6y-BoXaCTYrKM9_-23UA6B91Qavs6e/exec";

let allData = [];
let currentRow = null;
let currentNotes = [];

function loadData(){
  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    allData = data.reverse();
    render();
  });
}

function getNotes(n){
  try { return JSON.parse(n) || []; }
  catch { return []; }
}

function render(){
  let html = "";

  allData.forEach((row,i)=>{

    let notes = getNotes(row.note);
    let last = notes.length ? notes[notes.length-1].text : "";

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${row.name}</td>
      <td>${row.phone}</td>
      <td>${row.product}</td>

      <td>
        ${last}<br>
        <button onclick="openNotes(${row.row})">عرض</button>
      </td>

      <td>
        <button onclick="deleteRow(${row.row})">X</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function openNotes(rowNumber){
  currentRow = rowNumber;
  let row = allData.find(r => r.row === rowNumber);
  currentNotes = getNotes(row.note);
  renderNotes();
  document.getElementById("modal").style.display="flex";
}

function renderNotes(){
  let html="";
  currentNotes.forEach((n,i)=>{
    html += `<div>${n.text} <button onclick="deleteNote(${i})">X</button></div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value.trim();
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

/* 🔥 الحفظ (FormData) */
function saveNotes(){

  let formData = new FormData();

  formData.append("action","updateAll");
  formData.append("index", currentRow);
  formData.append("field","note");
  formData.append("value", JSON.stringify(currentNotes));

  fetch(url,{
    method:"POST",
    body: formData
  })
  .then(()=>{
    alert("تم الحفظ");
    loadData();
    closeModal();
  })
  .catch(()=>alert("خطأ"));
}

function deleteRow(row){
  let f = new FormData();
  f.append("action","delete");
  f.append("index", row);

  fetch(url,{method:"POST", body:f})
  .then(()=>loadData());
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

loadData();

</script>

</body>
</html>
