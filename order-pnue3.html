<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE TABLE</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

input {
  width: 100%;
  border: none;
  text-align: center;
  background: transparent;
}

input:focus {
  background: #ffffcc;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}
</style>

</head>
<body>
<input 
  type="text" 
  id="search" 
  placeholder="🔍 ابحث هنا..." 
  onkeyup="searchTable()"
  style="width:100%; padding:10px; margin-bottom:10px; font-size:16px;"
>
<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف1</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>
  المنتج ⬇️
  <br>
  <select id="productSelect" onchange="filterByProduct()">
    <option value="">الكل</option>
  </select>
</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
let html = "";
let productSet = new Set();

// نحافظ على index
let sorted = data.map((row, i) => ({ ...row, originalIndex: i }));

// ترتيب حسب التاريخ
sorted.sort((a, b) => {
  let dateA = new Date(a.date);
  let dateB = new Date(b.date);

  if (isNaN(dateA)) dateA = 0;
  if (isNaN(dateB)) dateB = 0;

  return dateB - dateA;
});

sorted.forEach((row) => {

  // ✅ نجمع المنتجات
  if (row.product) productSet.add(row.product);

  html += `
  <tr>
    <td><input value="${row.name || ''}" onchange="updateRow(${row.originalIndex},'name',this.value)"></td>
    <td><input value="${row.phone || ''}" onchange="updateRow(${row.originalIndex},'phone',this.value)"></td>
    <td><input value="${row.wilaya || ''}" onchange="updateRow(${row.originalIndex},'wilaya',this.value)"></td>
    <td><input value="${row.commune || ''}" onchange="updateRow(${row.originalIndex},'commune',this.value)"></td>
    <td><input value="${row.adresse || ''}" onchange="updateRow(${row.originalIndex},'adresse',this.value)"></td>
    <td><input value="${row.product || ''}" onchange="updateRow(${row.originalIndex},'product',this.value)"></td>
    <td>
      <input value="${formatDate(row.date) || ''}" onchange="updateRow(${row.originalIndex},'date',this.value)">
    </td>
    <td>
      <textarea onchange="updateRow(${row.originalIndex},'note',this.value)" style="width:100%; height:80px;">${row.note || ''}</textarea>
    </td>
    <td><button onclick="deleteRow(${row.originalIndex})">❌</button></td>
  </tr>`;
});

// عرض الجدول

// ✅ تعبئة قائمة المنتجات
let select = document.getElementById("productSelect");
select.innerHTML = `<option value="">الكل</option>`;

productSet.forEach(p => {
  select.innerHTML += `<option value="${p}">${p}</option>`;
});
      document.getElementById("data").innerHTML = html;
    })
    .catch(err => {
      alert("❌ خطأ في تحميل البيانات");
      console.error(err);
    });
}

// تعديل

function updateRow(index, field, value) {

  if (field === "note") {

    let now = new Date();
    let formattedDate = formatDate(now);

    // إضافة الملاحظة في سطر جديد
    value = value + "\n🕒 " + formattedDate + "\n-----------------\n";
  }

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: index,
      field: field,
      value: value
    })
  });
}
function formatDate(dateString) {
  if (!dateString) return "";

  let date = new Date(dateString);

  let y = date.getFullYear();
  let m = String(date.getMonth() + 1).padStart(2, '0');
  let d = String(date.getDate()).padStart(2, '0');

  let h = String(date.getHours()).padStart(2, '0');
  let min = String(date.getMinutes()).padStart(2, '0');

  return `${y}-${m}-${d} ${h}:${min}`;
}


function filterByProduct() {
  let selected = document.getElementById("productSelect").value.toLowerCase();
  let rows = document.querySelectorAll("#data tr");

  rows.forEach(row => {
    let productText = row.children[5].innerText.toLowerCase();

    if (selected === "" || productText === selected) {
      row.style.display = "";
    } else {
      row.style.display = "none";
    }
  });
}
function searchTable() {
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#data tr");

  rows.forEach(row => {
    let text = row.innerText.toLowerCase();

    if (text.includes(input)) {
      row.style.display = "";
    } else {
      row.style.display = "none";
    }
  });
}
// حذف
function deleteRow(index) {
  if(confirm("هل تريد حذف هذا الصف؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: index
      })
    }).then(() => loadData());
  }
}

// تشغيل
loadData();

</script>

</body>
</html>
