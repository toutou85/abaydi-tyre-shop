<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام PNUE الاحترافي</title>
<style>
body {
  font-family: Arial, sans-serif;
  direction: rtl;
  background: #f4f4f4;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

input, select, button, textarea {
  padding: 8px;
  font-size: 14px;
}

button {
  background: #d9534f;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.table-wrapper {
  overflow-x: auto;
  max-height: 70vh;
  background: #fff;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 95%;
  max-width: 400px;
  padding: 15px;
  border-radius: 10px;
}

#topMsg {
  position: fixed;
  top: -80px;
  width: 100%;
  text-align: center;
  background: #28a745;
  color: white;
  padding: 15px;
  transition: 0.5s;
  z-index: 1000;
}
</style>
</head>
<body>

<h2>📊 نظام PNUE الاحترافي</h2>

<div id="topMsg">تم الحفظ</div>

<div class="controls">
  <input type="text" id="search" placeholder="بحث..." oninput="render()">
  <select id="filter" onchange="render()">
    <option value="all">الكل</option>
    <option value="has">فيه ملاحظات</option>
    <option value="no">بدون ملاحظات</option>
  </select>
  <button onclick="showMore()">عرض المزيد</button>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>الاسم</th>
        <th>الهاتف</th>
        <th>الولاية</th>
        <th>المنتج</th>
        <th>التاريخ</th>
        <th>الملاحظات</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<!-- Modal للملاحظات -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>الملاحظات</h3>
    <div id="notesBox" style="max-height:200px; overflow-y:auto;"></div>
    <textarea id="newNote" placeholder="أضف ملاحظة جديدة..." style="width:100%; height:80px;"></textarea>
    <br><br>
    <button onclick="addNote()">إضافة</button>
    <button onclick="saveNotes()">حفظ</button>
    <button onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycby5JcMkevQJJhtjEcTkYY7EYrESFjc1lBjfLlEiaKQEUVx625i0Z7EbVL6UM-XvOPvW6w/exec"; // ضع رابط سكربت Google Apps Script الخاص بك

let allData = [];
let limit = 10;
let currentIndex = null;
let currentNotes = [];
let saving = false;

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      allData = data.reverse();
      render();
    })
    .catch(err => console.error(err));
}

// قراءة الملاحظات من JSON
function getNotes(note){
  try { return JSON.parse(note) || []; } catch { return []; }
}

// عرض البيانات في الجدول
function render() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const filter = document.getElementById("filter").value;
  let html = "";
  
  let filtered = allData.map((row,i)=>({...row, realIndex:i}))
    .filter(row=>{
      const matchSearch = row.name?.toLowerCase().includes(search) || row.phone?.includes(search) || row.product?.toLowerCase().includes(search);
      const notes = getNotes(row.note);
      const matchFilter = filter === "all" || (filter === "has" && notes.length) || (filter === "no" && !notes.length);
      return matchSearch && matchFilter;
    });

  filtered.slice(0, limit).forEach((row,index)=>{
    const notes = getNotes(row.note);
    const lastNote = notes.length ? notes[notes.length-1].text : "";
    html += `
    <tr>
      <td>${index+1}</td>
      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.product || ""}</td>
      <td>${row.date || ""}</td>
      <td>${lastNote} <br><button onclick="openNotes(${row.realIndex})">عرض</button></td>
      <td><button onclick="deleteRow(${row.realIndex})">X</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

// عرض المزيد
function showMore(){
  limit += 10;
  render();
}

// فتح نافذة الملاحظات
function openNotes(i){
  currentIndex = i;
  currentNotes = getNotes(allData[i].note);
  renderNotes();
  document.getElementById("modal").style.display = "flex";
}

// عرض الملاحظات داخل المودال
function renderNotes(){
  let html = "";
  currentNotes.forEach((n,i)=>{
    html += `<div>${n.text} <button onclick="deleteNote(${i})">X</button></div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

// إضافة ملاحظة جديدة
function addNote(){
  const text = document.getElementById("newNote").value.trim();
  if(!text) return;
  currentNotes.push({ text, date: new Date().toLocaleString() });
  document.getElementById("newNote").value="";
  renderNotes();
}

// حذف ملاحظة
function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

// حفظ الملاحظات في Google Sheets
function saveNotes(){
  if(saving) return;
  saving = true;
  const formData = new FormData();
  formData.append("action","updateAll");
  formData.append("index", currentIndex);
  formData.append("field","note");
  formData.append("value", JSON.stringify(currentNotes));

  fetch(url, { method: "POST", body: formData })
    .then(res => res.json())
    .then(res => {
      saving = false;
      showMsg("تم الحفظ");
      loadData();
      closeModal();
    })
    .catch(err=>{
      console.error(err);
      saving = false;
      showMsg("خطأ أثناء الحفظ", "red");
    });
}

// حذف صف كامل
function deleteRow(i){
  const formData = new FormData();
  formData.append("action","delete");
  formData.append("index",i);
  fetch(url,{method:"POST",body:formData})
    .then(()=>loadData());
}

// إغلاق المودال
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// رسالة مؤقتة
function showMsg(text,color="#28a745"){
  const m = document.getElementById("topMsg");
  m.innerText=text;
  m.style.background=color;
  m.style.top="0";
  setTimeout(()=>m.style.top="-80px",2000);
}

// بدء التحميل
loadData();
</script>

</body>
</html>
