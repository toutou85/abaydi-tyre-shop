<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام PNUE الاحترافي</title>

<style>
body {font-family: Arial;direction: rtl;background: #f4f4f4;padding: 10px;}
.controls {display: flex;gap: 10px;flex-wrap: wrap;margin-bottom: 10px;}
input, select, button {padding: 8px;}
.table-wrapper {overflow-x: auto;max-height: 75vh;background: #fff;border: 1px solid #ccc;}
table {width: 100%;border-collapse: collapse;min-width: 1500px;}
th, td {border: 1px solid #ccc;padding: 8px;text-align: center;white-space: nowrap;}
th {background: #eee;position: sticky;top: 0;}
button {background: red;color: white;border: none;border-radius: 5px;}
.modal {display: none;position: fixed;z-index: 99999;top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-content {background:#fff;width:90%;max-width:500px;padding:15px;border-radius:10px;}
.note-item {border-bottom:1px solid #ccc;padding:5px;}
</style>
</head>

<body>

<h2 style="text-align:center;">📊 نظام PNUE الاحترافي</h2>

<input type="text" id="search" placeholder="🔍 بحث..." oninput="render()">

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الولاية</th>
<th>البلدية</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<div id="modal" class="modal">
<div class="modal-content">

<h3>📌 الملاحظات</h3>
<div id="notesBox"></div>

<textarea id="newNote" style="width:100%;height:80px;"></textarea>

<br><br>

<button onclick="addNote()">➕ إضافة</button>
<button onclick="saveNotes()">💾 حفظ</button>
<button onclick="closeModal()">✖</button>

</div>
</div>

<script>

const url = "PUT_YOUR_LINK_HERE";

let allData = [];
let currentId = null;
let currentNotes = [];

function loadData(){
  fetch(url)
  .then(r=>r.json())
  .then(data=>{
    allData = data;
    render();
  });
}

function getNotes(note){
  if(!note) return [];
  try {
    let parsed = JSON.parse(note);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  allData.forEach((row,index)=>{

    let text = Object.values(row).join(" ").toLowerCase();
    if(!text.includes(search)) return;

    let notes = getNotes(row.note);
    let lastNote = notes.length ? notes[notes.length-1].text : "";

    html += `
    <tr>
      <td>${index+1}</td>
      <td>${row.name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.wilaya || ""}</td>
      <td>${row.commune || ""}</td>
      <td>
        ${lastNote}
        <br>
        <button onclick="openNotes(${row.id})">👁</button>
      </td>
      <td>
        <button onclick="deleteRow(${row.id})">❌</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function openNotes(id){
  currentId = id;
  let row = allData.find(r=>r.id===id);
  currentNotes = getNotes(row.note);
  renderNotes();
  document.getElementById("modal").style.display="flex";
}

function renderNotes(){
  let html="";
  currentNotes.forEach((n,i)=>{
    html += `
    <div class="note-item">
      ${n.text}
      <button onclick="deleteNote(${i})">❌</button>
    </div>`;
  });
  document.getElementById("notesBox").innerHTML = html;
}

function addNote(){
  let text = document.getElementById("newNote").value;
  if(!text) return;

  currentNotes.push({
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("newNote").value="";
  renderNotes();
}

function deleteNote(i){
  currentNotes.splice(i,1);
  renderNotes();
}

function saveNotes(){

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      action:"updateAll",
      id: currentId,
      field:"note",
      value: JSON.stringify(currentNotes)
    })
  })
  .then(r=>r.text())
  .then(()=>{
    loadData();
  })
  .catch(()=>{
    alert("❌ فشل الإرسال");
  });

  closeModal();
}

function deleteRow(id){
  if(confirm("حذف؟")){
    fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        action:"delete",
        id:id
      })
    }).then(()=>loadData());
  }
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

loadData();

</script>

</body>
</html>
