<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PNUE TABLE</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  padding: 15px;
  background: #f4f4f4;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

th {
  background: #eee;
  position: sticky;
  top: 0;
}

input {
  width: 100%;
  border: none;
  text-align: center;
  background: transparent;
}

input:focus {
  background: #ffffcc;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkred;
}
</style>

</head>
<body>

<h2>📋 جدول الطلبات PNUE</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف1</th>
<th>الولاية</th>
<th>البلدية</th>
<th>العنوان</th>
<th>المنتج</th>
<th>التاريخ</th>
<th>الملاحظات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const url = "https://script.google.com/macros/s/AKfycbxk0VpVSa4ZRXX5UOPqDrTfPwK467qCMcQ0c9f-Dd4s49Do7IayFJnXpBwXzqn3AIzAIQ/exec";

// تحميل البيانات
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.forEach((row, i) => {
        html += `
        <tr>
          <td><input value="${row.name || ''}" onchange="updateRow(${i},'name',this.value)"></td>
          <td><input value="${row.phone || ''}" onchange="updateRow(${i},'phone',this.value)"></td>
          <td><input value="${row.phone2 || ''}" onchange="updateRow(${i},'phone2',this.value)"></td>
          <td><input value="${row.code || ''}" onchange="updateRow(${i},'code',this.value)"></td>
          <td><input value="${row.wilaya || ''}" onchange="updateRow(${i},'wilaya',this.value)"></td>
          <td><input value="${row.commune || ''}" onchange="updateRow(${i},'commune',this.value)"></td>
          <td><input value="${row.adresse || ''}" onchange="updateRow(${i},'adresse',this.value)"></td>
          <td><input value="${row.product || ''}" onchange="updateRow(${i},'product',this.value)"></td>
        
<td>
  <input 
    value="${formatDate(row.date) || ''}" 
    onchange="updateRow(${i},'date',this.value)"
  >
</td>





          <td><input value="${row.note || ''}" onchange="updateRow(${i},'note',this.value)"></td>
        

  <td><button onclick="deleteRow(${i})">❌</button></td>
        </tr>`;
      });

      document.getElementById("data").innerHTML = html;
    })
    .catch(err => {
      alert("❌ خطأ في تحميل البيانات");
      console.error(err);
    });
}

// تعديل

function updateRow(index, field, value) {

  // إذا التعديل على الملاحظة
  if (field === "note") {

    let now = new Date();
    let formattedDate = formatDate(now);

    value = value + " | 🕒 " + formattedDate;
  }

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "updateAll",
      index: index,
      field: field,
      value: value
    })
  });
}
function formatDate(dateString) {
  if (!dateString) return "";

  let date = new Date(dateString);

  let y = date.getFullYear();
  let m = String(date.getMonth() + 1).padStart(2, '0');
  let d = String(date.getDate()).padStart(2, '0');

  let h = String(date.getHours()).padStart(2, '0');
  let min = String(date.getMinutes()).padStart(2, '0');

  return `${y}-${m}-${d} ${h}:${min}`;
}

// حذف
function deleteRow(index) {
  if(confirm("هل تريد حذف هذا الصف؟")) {
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        index: index
      })
    }).then(() => loadData());
  }
}

// تشغيل
loadData();

</script>

</body>
</html>
