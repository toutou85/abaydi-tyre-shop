<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>VIP CREDIT SYSTEM</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #0f172a;
  color: white;
  padding: 10px;
}

.top-bar {
  display: flex;
  gap: 5px;
}

button {
  padding: 8px;
  border: none;
  cursor: pointer;
  color: white;
}

.add { background: #22c55e; }
.edit { background: #3b82f6; }
.delete { background: #ef4444; }
.pay { background: #f59e0b; }

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #334155;
  padding: 6px;
  text-align: center;
}

th { background: #1e293b; }

tr.selected { background: #334155; }

.red { color: red; }

.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background:#1e293b;
  margin:5% auto;
  padding:20px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<h2>🔥 نظام الكريدي VIP</h2>

<div class="top-bar">
  <button class="add" onclick="openAdd()">➕</button>
  <button class="edit" onclick="openEdit()">✏️</button>
  <button class="delete" onclick="remove()">🗑</button>
  <button class="pay" onclick="pay()">💰</button>
</div>

<input id="search" placeholder="🔍 بحث..." onkeyup="filter()">

<table>
<thead>
<tr>
<th>ID</th>
<th>الاسم</th>
<th>التاريخ</th>
<th>الهاتف</th>
<th>المنتج</th>
<th>الإجمالي</th>
<th>المدفوع</th>
<th>الباقي</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<!-- مودال -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="name" placeholder="الاسم">
<input id="date" type="date">
<input id="phone" placeholder="الهاتف">
<input id="product" placeholder="المنتج">
<input id="total" type="number" placeholder="الإجمالي">
<input id="paid" type="number" placeholder="المدفوع">

<button onclick="save()">💾 حفظ</button>
<button onclick="closeModal()">❌</button>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwoAv0hrN4f8Q2-aM9yOzqaGj_TCGUA9ws6Ebb368dY7giYUWesJpktf_nhAVlNwM6Ehg/exec";

let selectedId = null;
let allData = [];
let mode = "add";

// تحميل
function load() {

fetch(API)
.then(res => res.text())
.then(text => {
  let data = JSON.parse(text).data;

  allData = data.slice(1);
  render(allData);
});
// عرض
function render(data){
  let html = "";

  data.forEach(row=>{
    let remain = (row[5]||0) - (row[6]||0);

    html += `
    <tr onclick="selectRow(this,${row[0]})">
      <td>${row[0]}</td>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[3]}</td>
      <td>${row[4]}</td>
      <td>${row[5]}</td>
      <td>${row[6]}</td>
      <td class="${remain>0?'red':''}">${remain}</td>
    </tr>`;
  });

  dataEl.innerHTML = html;
}

// اختيار
function selectRow(row,id){
  document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));
  row.classList.add("selected");
  selectedId = id;
}

// بحث
function filter(){
  let q = search.value.toLowerCase();
  render(allData.filter(r=>r.join(" ").toLowerCase().includes(q)));
}

// فتح إضافة
function openAdd(){
  mode="add";
  clearInputs();
  modal.style.display="block";
}

// تعديل
function openEdit(){
  if(!selectedId) return alert("اختر صف");

  mode="edit";

  let row = allData.find(r=>r[0]==selectedId);

  name.value=row[1];
  date.value=row[2];
  phone.value=row[3];
  product.value=row[4];
  total.value=row[5];
  paid.value=row[6];

  modal.style.display="block";
}

// حفظ
function save(){
  let obj={
    id:selectedId,
    name:name.value,
    date:date.value,
    phone:phone.value,
    product:product.value,
    total:total.value,
    paid:paid.value
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action: mode==="add"?"add":"update",
      ...obj
    })
  }).then(()=>load());

  modal.style.display="none";
}

// حذف
function remove(){
  if(!selectedId) return alert("اختر صف");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:selectedId
    })
  }).then(()=>load());
}

// تسديد
function pay(){
  if(!selectedId) return alert("اختر صف");

  let amount = prompt("المبلغ:");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"pay",
      id:selectedId,
      amount:amount
    })
  }).then(()=>load());
}

// تنظيف
function clearInputs(){
  name.value="";
  date.value="";
  phone.value="";
  product.value="";
  total.value="";
  paid.value="";
}

// إغلاق
function closeModal(){
  modal.style.display="none";
}

load();
</script>

</body>
</html>
