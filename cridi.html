<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الكريدي</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #0f172a;
  color: white;
  padding: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #334155;
  padding: 6px;
  text-align: center;
}

th {
  background: #1e293b;
}

/* نافذة */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background:#1e293b;
  margin:10% auto;
  padding:20px;
  width:400px;
}
</style>
</head>

<body>

<h2>📋 نظام الكريدي</h2>

<input id="name" placeholder="الاسم">
<input id="date" type="date">
<input id="phone" placeholder="الهاتف">
<input id="product" placeholder="المنتج">
<input id="total" type="number" placeholder="الإجمالي">
<input id="paid" type="number" placeholder="المدفوع">

<button onclick="add()">➕ إضافة</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>الاسم</th>
<th>التاريخ</th>
<th>الهاتف</th>
<th>المنتج</th>
<th>الإجمالي</th>
<th>المدفوع</th>
<th>الباقي</th>
<th>إجراءات</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<!-- نافذة الملاحظات -->
<div id="modal" class="modal">
<div class="modal-content">
<h3>ملاحظة</h3>
<textarea id="noteText" style="width:100%;height:100px"></textarea>
<button onclick="saveNote()">حفظ</button>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>
let currentId = null;
const dataEl = document.getElementById("data");
const modal = document.getElementById("modal");
const noteText = document.getElementById("noteText");

// تحميل البيانات
function load() {
  google.script.run.withSuccessHandler(function(data) {

    let html = "";

    for (let i = 1; i < data.length; i++) {

      let total = Number(data[i][5]) || 0;
      let paid = Number(data[i][6]) || 0;
      let remain = total - paid;

      html += `
      <tr>
        <td>${data[i][0]}</td>
        <td>${data[i][1]}</td>
        <td>${data[i][2]}</td>
        <td>${data[i][3]}</td>
        <td>${data[i][4]}</td>
        <td>${total}</td>
        <td>${paid}</td>
        <td>${remain}</td>
        <td>
          <button onclick="del(${data[i][0]})">🗑</button>
          <button onclick="openNote(${data[i][0]})">📝</button>
        </td>
      </tr>`;
    }

    dataEl.innerHTML = html;

  }).getData();
}

// إضافة كريدي
function add() {

  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let phone = document.getElementById("phone").value;
  let product = document.getElementById("product").value;
  let total = document.getElementById("total").value;
  let paid = document.getElementById("paid").value;

  if (!name || !date || !phone || !product || !total) {
    alert("⚠️ املأ جميع الحقول");
    return;
  }

  let obj = { name, date, phone, product, total, paid };

  google.script.run.withSuccessHandler(function(){
    clearInputs();
    load();
  }).addCredit(obj);
}

// تفريغ الحقول
function clearInputs() {
  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("product").value = "";
  document.getElementById("total").value = "";
  document.getElementById("paid").value = "";
}

// حذف
function del(id) {
  if (confirm("هل أنت متأكد من الحذف؟")) {
    google.script.run.withSuccessHandler(load).deleteCredit(id);
  }
}

// فتح ملاحظة
function openNote(id) {
  currentId = id;

  google.script.run.withSuccessHandler(function(note){
    noteText.value = note || "";
    modal.style.display = "block";
  }).getNote(id);
}

// حفظ ملاحظة
function saveNote() {
  google.script.run.withSuccessHandler(function(){
    modal.style.display = "none";
    load();
  }).addNote(currentId, noteText.value);
}

// غلق
function closeModal() {
  modal.style.display = "none";
}

load();
</script>

</body>
</html>
